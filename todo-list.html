<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 To-Do List App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .slide-out { animation: slideOut 0.3s ease-out; }
    @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(100%); } }
    .task-item { transition: all 0.2s ease; }
    .task-item:hover { transform: translateX(4px); }
    .checkbox-custom { appearance: none; width: 20px; height: 20px; border: 2px solid #cbd5e1; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .checkbox-custom:checked { background-color: #10b981; border-color: #10b981; }
    .checkbox-custom:checked::after { content: "✓"; color: white; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen p-4">
  
  <!-- Header -->
  <header class="text-center mb-8 mt-6">
    <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent mb-2">
      📝 My To-Do List
    </h1>
    <p class="text-gray-600 text-lg">Stay organized and productive</p>
  </header>

  <!-- Main Container -->
  <div class="max-w-2xl mx-auto">
    
    <!-- Input Section -->
    <div class="bg-white rounded-lg shadow-lg p-6 mb-8 fade-in">
      <div class="flex gap-2">
        <input 
          id="todoInput" 
          type="text" 
          placeholder="Add a new task..." 
          class="flex-1 px-4 py-3 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
          onkeypress="if(event.key==='Enter') addTodo()">
        <button 
          onclick="addTodo()" 
          class="px-6 py-3 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg font-bold hover:shadow-lg transition transform hover:scale-105">
          Add Task
        </button>
      </div>
      <p class="text-sm text-gray-500 mt-2">💡 Pro tip: Press Enter to add a task quickly</p>
    </div>

    <!-- Stats Section -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-gray-600 text-sm font-semibold">Total Tasks</p>
        <p class="text-3xl font-bold text-blue-600" id="totalTasks">0</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-gray-600 text-sm font-semibold">Completed</p>
        <p class="text-3xl font-bold text-green-600" id="completedTasks">0</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-gray-600 text-sm font-semibold">Progress</p>
        <p class="text-3xl font-bold text-purple-600" id="progressPercent">0%</p>
      </div>
    </div>

    <!-- Filter Buttons -->
    <div class="flex gap-2 mb-6 flex-wrap">
      <button onclick="filterTodos('all')" class="filter-btn px-4 py-2 rounded-full font-semibold bg-blue-600 text-white transition" data-filter="all">
        All
      </button>
      <button onclick="filterTodos('active')" class="filter-btn px-4 py-2 rounded-full font-semibold bg-gray-200 text-gray-700 hover:bg-gray-300 transition" data-filter="active">
        Active
      </button>
      <button onclick="filterTodos('completed')" class="filter-btn px-4 py-2 rounded-full font-semibold bg-gray-200 text-gray-700 hover:bg-gray-300 transition" data-filter="completed">
        Completed
      </button>
    </div>

    <!-- Tasks List -->
    <div class="space-y-2" id="todosList">
      <div class="text-center py-12 text-gray-500">
        <p class="text-xl">🎉 No tasks yet! Time to relax?</p>
        <p class="text-sm mt-2">Add a task above to get started</p>
      </div>
    </div>

    <!-- Clear Completed Button -->
    <div class="mt-8 text-center">
      <button 
        onclick="clearCompleted()" 
        class="px-6 py-2 bg-red-500 text-white rounded-lg font-semibold hover:bg-red-600 transition" 
        id="clearBtn"
        style="display: none;">
        🗑️ Clear Completed
      </button>
    </div>

    <!-- Export/Import Section -->
    <div class="mt-8 bg-white rounded-lg shadow-lg p-6">
      <h3 class="text-lg font-bold mb-4 text-gray-800">⚙️ Data Management</h3>
      <div class="flex gap-3 flex-wrap">
        <button 
          onclick="exportData()" 
          class="px-4 py-2 bg-green-500 text-white rounded-lg font-semibold hover:bg-green-600 transition">
          📥 Export Data
        </button>
        <button 
          onclick="document.getElementById('importFile').click()" 
          class="px-4 py-2 bg-purple-500 text-white rounded-lg font-semibold hover:bg-purple-600 transition">
          📤 Import Data
        </button>
        <button 
          onclick="resetAll()" 
          class="px-4 py-2 bg-gray-500 text-white rounded-lg font-semibold hover:bg-gray-600 transition">
          🔄 Reset All
        </button>
        <input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display: none;">
      </div>
    </div>
  </div>

  <script>
    // Initialize App
    let todos = [];
    let currentFilter = 'all';

    // Load todos from localStorage on page load
    window.addEventListener('DOMContentLoaded', () => {
      loadTodos();
      updateStats();
    });

    // Save todos to localStorage
    function saveTodos() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    // Load todos from localStorage
    function loadTodos() {
      const saved = localStorage.getItem('todos');
      todos = saved ? JSON.parse(saved) : [];
      renderTodos();
    }

    // Add a new todo
    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();

      if (!text) {
        alert('Please enter a task!');
        return;
      }

      if (text.length > 200) {
        alert('Task is too long! Maximum 200 characters.');
        return;
      }

      const todo = {
        id: Date.now(),
        text: text,
        completed: false,
        createdAt: new Date().toLocaleString(),
        priority: 'normal'
      };

      todos.unshift(todo);
      saveTodos();
      input.value = '';
      input.focus();
      renderTodos();
      updateStats();
    }

    // Toggle todo completion
    function toggleTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.completed = !todo.completed;
        saveTodos();
        renderTodos();
        updateStats();
      }
    }

    // Delete a todo
    function deleteTodo(id) {
      if (confirm('Are you sure you want to delete this task?')) {
        todos = todos.filter(t => t.id !== id);
        saveTodos();
        renderTodos();
        updateStats();
      }
    }

    // Edit a todo
    function editTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (!todo) return;

      const newText = prompt('Edit task:', todo.text);
      if (newText && newText.trim()) {
        todo.text = newText.trim();
        saveTodos();
        renderTodos();
      }
    }

    // Set priority
    function setPriority(id, priority) {
      const todo = todos.find(t => t.id === id);
      if (todo) {
        todo.priority = priority;
        saveTodos();
        renderTodos();
      }
    }

    // Filter todos
    function filterTodos(filter) {
      currentFilter = filter;
      
      // Update button styles
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('bg-blue-600', 'text-white');
        btn.classList.add('bg-gray-200', 'text-gray-700');
      });
      event.target.classList.add('bg-blue-600', 'text-white');
      event.target.classList.remove('bg-gray-200', 'text-gray-700');

      renderTodos();
    }

    // Get filtered todos
    function getFilteredTodos() {
      switch (currentFilter) {
        case 'active':
          return todos.filter(t => !t.completed);
        case 'completed':
          return todos.filter(t => t.completed);
        default:
          return todos;
      }
    }

    // Render todos
    function renderTodos() {
      const filtered = getFilteredTodos();
      const todosList = document.getElementById('todosList');

      if (filtered.length === 0) {
        todosList.innerHTML = `
          <div class="text-center py-12 text-gray-500">
            <p class="text-xl">
              ${currentFilter === 'completed' ? '✅ No completed tasks yet!' : 
                currentFilter === 'active' ? '🎯 All tasks completed! Great job!' : 
                '🎉 No tasks yet! Time to relax?'}
            </p>
            <p class="text-sm mt-2">
              ${currentFilter === 'all' ? 'Add a task above to get started' : ''}
            </p>
          </div>
        `;
        return;
      }

      todosList.innerHTML = filtered.map(todo => `
        <div class="task-item bg-white rounded-lg shadow-md p-4 fade-in hover:shadow-lg ${todo.completed ? 'opacity-75' : ''}">
          <div class="flex items-start gap-4">
            <!-- Checkbox -->
            <input 
              type="checkbox" 
              class="checkbox-custom mt-1" 
              ${todo.completed ? 'checked' : ''}
              onchange="toggleTodo(${todo.id})">
            
            <!-- Content -->
            <div class="flex-1">
              <p class="text-lg font-semibold text-gray-800 ${todo.completed ? 'line-through text-gray-500' : ''}">
                ${escapeHtml(todo.text)}
              </p>
              <p class="text-sm text-gray-500 mt-1">📅 ${todo.createdAt}</p>
            </div>

            <!-- Priority Badge -->
            <select 
              class="px-3 py-1 rounded-full text-sm font-semibold border-2 transition cursor-pointer
                ${todo.priority === 'high' ? 'bg-red-50 border-red-300 text-red-700' : 
                  todo.priority === 'medium' ? 'bg-yellow-50 border-yellow-300 text-yellow-700' : 
                  'bg-green-50 border-green-300 text-green-700'}"
              onchange="setPriority(${todo.id}, this.value)">
              <option value="low" ${todo.priority === 'low' ? 'selected' : ''}>Low</option>
              <option value="medium" ${todo.priority === 'medium' ? 'selected' : ''}>Medium</option>
              <option value="high" ${todo.priority === 'high' ? 'selected' : ''}>High</option>
            </select>

            <!-- Actions -->
            <div class="flex gap-2">
              <button 
                onclick="editTodo(${todo.id})" 
                class="px-3 py-1 bg-blue-500 text-white rounded-lg text-sm font-semibold hover:bg-blue-600 transition">
                ✏️
              </button>
              <button 
                onclick="deleteTodo(${todo.id})" 
                class="px-3 py-1 bg-red-500 text-white rounded-lg text-sm font-semibold hover:bg-red-600 transition">
                🗑️
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Update statistics
    function updateStats() {
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      const progress = total === 0 ? 0 : Math.round((completed / total) * 100);

      document.getElementById('totalTasks').textContent = total;
      document.getElementById('completedTasks').textContent = completed;
      document.getElementById('progressPercent').textContent = progress + '%';

      // Show/hide clear button
      document.getElementById('clearBtn').style.display = completed > 0 ? 'inline-block' : 'none';
    }

    // Clear all completed todos
    function clearCompleted() {
      if (confirm('Are you sure you want to delete all completed tasks?')) {
        todos = todos.filter(t => !t.completed);
        saveTodos();
        renderTodos();
        updateStats();
      }
    }

    // Export data to JSON file
    function exportData() {
      const dataStr = JSON.stringify(todos, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `todos-${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    // Import data from JSON file
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const imported = JSON.parse(e.target.result);
          if (Array.isArray(imported)) {
            if (confirm('Replace all tasks with imported data?')) {
              todos = imported;
              saveTodos();
              renderTodos();
              updateStats();
              alert('✅ Tasks imported successfully!');
            }
          } else {
            alert('❌ Invalid file format!');
          }
        } catch (error) {
          alert('❌ Error reading file: ' + error.message);
        }
      };
      reader.readAsText(file);
      event.target.value = ''; // Reset input
    }

    // Reset all data
    function resetAll() {
      if (confirm('This will delete ALL tasks. Are you sure?')) {
        if (confirm('Are you really sure? This cannot be undone!')) {
          todos = [];
          saveTodos();
          renderTodos();
          updateStats();
          alert('🔄 All tasks have been cleared!');
        }
      }
    }

    // Utility: Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        alert('✅ Tasks are automatically saved to your browser!');
      }
      if (e.key === 'Escape') {
        document.getElementById('todoInput').focus();
      }
    });
  </script>
</body>
</html>
