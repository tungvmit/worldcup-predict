<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef}=React;

/* ══════════════════ FLAGS MAP ══════════════════════════════════════════════ */
// country code → ISO 3166-1 alpha-2 for flagcdn.com

  "Canada":"ca","Honduras":"hn","El Salvador":"sv","Maroc":"ma",

// Return a small inline flag image element; falls back to neutral flag
function FL({name,size=20}){
  const code=FLAG_CODES[name];
  if(!code)return <span style={{fontSize:size+"px",lineHeight:1}}>🏳️</span>;
  return(
    <img
      src={`https://flagcdn.com/w40/${code}.png`}
      alt={name}
      title={name}
      style={{width:(size*1.4)+"px",height:size+"px",objectFit:"cover",borderRadius:"3px",verticalAlign:"middle",display:"inline-block",flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,0.4)"}}
      onError={e=>{e.target.style.display="none";}}
    />
  );
}

/* ══════════════════ CONSTANTS ══════════════════════════════════════════════ */
const PHASES={
  group:{label:"Vòng Bảng",bet:10000},
  r32:{label:"Vòng 1/16",bet:20000},
  r16:{label:"Vòng 1/8",bet:20000},
  qf:{label:"Tứ Kết",bet:20000},
  sf:{label:"Bán Kết",bet:20000},
  third:{label:"Tranh HB3",bet:50000},
  final:{label:"Chung Kết",bet:100000},
};
const GROUPS={
  A:["Mỹ","Panama","Uruguay","Bolivia"],
  B:["Mexico","Jamaica","Venezuela","Ecuador"],
  C:["Canada","Honduras","El Salvador","Maroc"],
  D:["Đức","Nhật Bản","Úc","Chile"],
  E:["Tây Ban Nha","Hà Lan","Serbia","Senegal"],
  F:["Pháp","Bỉ","Ukraine","Cameroon"],
  G:["Anh","Croatia","Thổ Nhĩ Kỳ","Saudi Arabia"],
  H:["Brazil","Colombia","Peru","Mali"],
  I:["Argentina","Paraguay","Iran","Nigeria"],
  J:["Hàn Quốc","Qatar","Iraq","Romania"],
  K:["Ý","Thụy Sĩ","Áo","Ai Cập"],
  L:["Bồ Đào Nha","Ba Lan","Đan Mạch","New Zealand"],
};
const MAX_SAME=4,MAX_CHG=3,DEFAULT_PWD="12345";
const SK="wc2026_v5",SK_ADM="wc2026_adm5",SK_PLY="wc2026_ply5";

/* ══════════════════ SCHEDULE ═══════════════════════════════════════════════ */
const SCH_GROUP={
  A_0_1:"2026-06-12T09:00",A_0_2:"2026-06-12T18:00",A_0_3:"2026-06-16T09:00",A_1_2:"2026-06-16T18:00",A_1_3:"2026-06-20T22:00",A_2_3:"2026-06-20T22:00",
  B_0_1:"2026-06-13T02:00",B_0_2:"2026-06-13T05:00",B_0_3:"2026-06-17T02:00",B_1_2:"2026-06-17T05:00",B_1_3:"2026-06-21T22:00",B_2_3:"2026-06-21T22:00",
  C_0_1:"2026-06-13T18:00",C_0_2:"2026-06-14T02:00",C_0_3:"2026-06-17T18:00",C_1_2:"2026-06-18T02:00",C_1_3:"2026-06-22T22:00",C_2_3:"2026-06-22T22:00",
  D_0_1:"2026-06-14T18:00",D_0_2:"2026-06-15T02:00",D_0_3:"2026-06-18T18:00",D_1_2:"2026-06-19T02:00",D_1_3:"2026-06-23T22:00",D_2_3:"2026-06-23T22:00",
  E_0_1:"2026-06-15T18:00",E_0_2:"2026-06-15T21:00",E_0_3:"2026-06-19T18:00",E_1_2:"2026-06-19T21:00",E_1_3:"2026-06-24T22:00",E_2_3:"2026-06-24T22:00",
  F_0_1:"2026-06-14T09:00",F_0_2:"2026-06-14T22:00",F_0_3:"2026-06-18T09:00",F_1_2:"2026-06-18T22:00",F_1_3:"2026-06-24T02:00",F_2_3:"2026-06-24T05:00",
  G_0_1:"2026-06-15T09:00",G_0_2:"2026-06-15T22:00",G_0_3:"2026-06-19T09:00",G_1_2:"2026-06-19T22:00",G_1_3:"2026-06-25T02:00",G_2_3:"2026-06-25T05:00",
  H_0_1:"2026-06-16T02:00",H_0_2:"2026-06-16T05:00",H_0_3:"2026-06-20T02:00",H_1_2:"2026-06-20T05:00",H_1_3:"2026-06-25T22:00",H_2_3:"2026-06-25T22:00",
  I_0_1:"2026-06-16T09:00",I_0_2:"2026-06-17T09:00",I_0_3:"2026-06-20T09:00",I_1_2:"2026-06-21T09:00",I_1_3:"2026-06-26T22:00",I_2_3:"2026-06-26T22:00",
  J_0_1:"2026-06-17T22:00",J_0_2:"2026-06-18T05:00",J_0_3:"2026-06-21T18:00",J_1_2:"2026-06-22T05:00",J_1_3:"2026-06-27T02:00",J_2_3:"2026-06-27T05:00",
  K_0_1:"2026-06-13T09:00",K_0_2:"2026-06-13T22:00",K_0_3:"2026-06-17T22:00",K_1_2:"2026-06-18T09:00",K_1_3:"2026-06-27T22:00",K_2_3:"2026-06-27T22:00",
  L_0_1:"2026-06-12T22:00",L_0_2:"2026-06-13T02:00",L_0_3:"2026-06-16T22:00",L_1_2:"2026-06-17T02:00",L_1_3:"2026-06-28T02:00",L_2_3:"2026-06-28T05:00",
};
const SCH_KO=[
  "2026-07-01T02:00","2026-07-01T05:00","2026-07-01T22:00","2026-07-02T02:00","2026-07-02T05:00","2026-07-02T22:00","2026-07-03T02:00","2026-07-03T05:00",
  "2026-07-03T22:00","2026-07-04T02:00","2026-07-04T05:00","2026-07-04T22:00","2026-07-05T02:00","2026-07-05T05:00","2026-07-05T22:00","2026-07-06T02:00",
  "2026-07-08T02:00","2026-07-08T22:00","2026-07-09T02:00","2026-07-09T22:00","2026-07-10T02:00","2026-07-10T22:00","2026-07-11T02:00","2026-07-11T22:00",
  "2026-07-14T22:00","2026-07-15T22:00","2026-07-16T22:00","2026-07-17T22:00",
  "2026-07-21T22:00","2026-07-22T22:00","2026-07-25T22:00","2026-07-26T22:00",
];

function genMatches(){
  const ms=[];let n=1;
  Object.entries(GROUPS).forEach(([g,t])=>{
    for(let i=0;i<4;i++)for(let j=i+1;j<4;j++)
      ms.push({id:`M${String(n++).padStart(3,"0")}`,phase:"group",group:g,home:t[i],away:t[j],status:"upcoming",result:null,preds:[],kickoff:SCH_GROUP[`${g}_${i}_${j}`]||null});
  });
  let ki=0;
  [["r32",16],["r16",8],["qf",4],["sf",2],["third",1],["final",1]].forEach(([ph,c])=>{
    for(let i=0;i<c;i++)ms.push({id:`M${String(n++).padStart(3,"0")}`,phase:ph,group:null,home:"TBD",away:"TBD",status:"upcoming",result:null,preds:[],kickoff:SCH_KO[ki++]||null});
  });
  return ms;
}

/* ══════════════════ HELPERS ════════════════════════════════════════════════ */
// 1 CiViet = 1,000 Đồng  →  10,000₫ = 10 CiViet
const VND_PER_CV=1000;
const toCv=vnd=>vnd/VND_PER_CV;
const fmt=vnd=>{
  const cv=toCv(Math.round(vnd));
  // Hiển thị nguyên nếu tròn, có 1 chữ số thập phân nếu lẻ
  const s=Number.isInteger(cv)?cv.toLocaleString("vi-VN"):(cv).toLocaleString("vi-VN",{minimumFractionDigits:1,maximumFractionDigits:1});
  return s+" CiViet";
};
// For Excel export: raw VND
const fmtVND=n=>Math.round(n);
const fmtDT=iso=>iso?new Date(iso).toLocaleString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}):null;
const fmtDate=iso=>iso?new Date(iso).toLocaleDateString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh",day:"2-digit",month:"2-digit",year:"numeric"}):null;
const vnDate=t=>new Date(t.toLocaleString("en-US",{timeZone:"Asia/Ho_Chi_Minh"}));
const isToday=iso=>{if(!iso)return false;const n=vnDate(new Date()),d=vnDate(new Date(iso));return n.getFullYear()===d.getFullYear()&&n.getMonth()===d.getMonth()&&n.getDate()===d.getDate();};
const isSoon=iso=>{if(!iso)return false;const diff=new Date(iso)-Date.now();return diff>0&&diff<3*3600000;};
const isPast=iso=>iso&&new Date(iso)<Date.now();

function calcStats(m,allPlayers=[]){
  const bet=PHASES[m.phase].bet,pool=m.preds.length*bet;
  // penalty: registered players who missed this match
  const registeredNames=Object.values(allPlayers).map(p=>p.name.toLowerCase());
  const predictedNames=m.preds.map(p=>p.name.toLowerCase());
  const missed=registeredNames.filter(nm=>!predictedNames.includes(nm));
  const penaltyPool=missed.length*bet;
  const totalPool=pool+penaltyPool;
  const fund=Math.round(totalPool*.15);
  const prize=Math.round(totalPool*.85);
  const winners=m.result?m.preds.filter(p=>p.h===m.result.h&&p.a===m.result.a):[];
  const perW=winners.length?Math.round(prize/winners.length):0;
  return{bet,pool,penaltyPool,totalPool,fund,prize,winners,perW,missed};
}

const ls={
  get:k=>{try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  str:k=>localStorage.getItem(k)||"",
  setStr:(k,v)=>localStorage.setItem(k,v),
};

/* ══════════════════ APP ════════════════════════════════════════════════════ */
function App(){
  const [data,setData]=useState(()=>ls.get(SK)||{matches:genMatches(),fund:0});
  const [admPwd,setAdmPwd]=useState(()=>ls.str(SK_ADM)||DEFAULT_PWD);
  const [players,setPlayers]=useState(()=>ls.get(SK_PLY)||{});
  const [curUser,setCurUser]=useState(()=>ls.str("wc2026_ses")||"");
  const [tab,setTab]=useState("guide");
  const [phase,setPhase]=useState("group");
  const [grp,setGrp]=useState("A");
  const [tick,setTick]=useState(0);
  const [loginModal,setLoginModal]=useState(null);
  const [predModal,setPredModal]=useState(null);
  const [resultModal,setResultModal]=useState(null);
  const [editTeamModal,setEditTeamModal]=useState(null);
  const [detailModal,setDetailModal]=useState(null);
  const [admChangePwdModal,setAdmChangePwdModal]=useState(false);
  const [admUnlocked,setAdmUnlocked]=useState(false);
  const [admSubTab,setAdmSubTab]=useState("matches");
  const [playerMgmtModal,setPlayerMgmtModal]=useState(null);
  const [lPwd,setLPwd]=useState(""),  [lPwd2,setLPwd2]=useState(""), [lErr,setLErr]=useState(""), [lName,setLName]=useState("");
  const [rH,setRH]=useState(""), [rA,setRA]=useState("");
  const [eH,setEH]=useState(""), [eA,setEA]=useState("");
  const [pH,setPH]=useState(""), [pA,setPA]=useState("");
  const [newAdmPwd,setNewAdmPwd]=useState(""), [newAdmPwd2,setNewAdmPwd2]=useState("");
  const [toast,setToast]=useState(null);

  useEffect(()=>{const t=setInterval(()=>setTick(x=>x+1),300000);return()=>clearInterval(t);},[]); // auto refresh 5 phút

  const persist=useCallback(d=>{setData(d);ls.set(SK,d);},[]);
  const persistPlayers=useCallback(p=>{setPlayers(p);ls.set(SK_PLY,p);},[]);
  const showT=useCallback((msg,t="ok")=>{setToast({msg,t});setTimeout(()=>setToast(null),3200);},[]);

  const getPlayer=nm=>players[nm.toLowerCase()];
  const isRegistered=nm=>!!players[nm.toLowerCase()];

  function saveSession(nm){setCurUser(nm);ls.setStr("wc2026_ses",nm);}
  function logout(){setCurUser("");ls.setStr("wc2026_ses","");setAdmUnlocked(false);showT("Đã đăng xuất");}
  function openLogin(opts={}){setLName(opts.name||"");setLPwd("");setLPwd2("");setLErr("");setLoginModal({mode:"login",...opts});}

  function handleLogin(){
    const nm=lName.trim();
    if(!nm){setLErr("Nhập tên của bạn");return;}
    if(!lPwd){setLErr("Nhập mật khẩu");return;}
    if(!isRegistered(nm)){
      if(lPwd!==DEFAULT_PWD){setLErr(`Lần đầu dùng mật khẩu mặc định: ${DEFAULT_PWD}`);return;}
      const np={...players,[nm.toLowerCase()]:{name:nm,pwd:DEFAULT_PWD,mustChange:true,joinedAt:Date.now()}};
      persistPlayers(np);saveSession(nm);
      setLoginModal({mode:"forcepwd",name:nm});setLPwd("");setLPwd2("");setLErr("");return;
    }
    const p=getPlayer(nm);
    if(p.pwd!==lPwd){setLErr("Sai mật khẩu!");return;}
    saveSession(nm);
    if(p.mustChange){setLoginModal({mode:"forcepwd",name:nm});setLPwd("");setLPwd2("");setLErr("");return;}
    setLoginModal(null);setLPwd("");setLPwd2("");setLErr("");
    showT(`✅ Chào ${nm}!`);
    if(loginModal?.next) loginModal.next(nm);
  }
  function handleForcePwd(){
    if(lPwd.length<4){setLErr("Mật khẩu ≥ 4 ký tự");return;}
    if(lPwd!==lPwd2){setLErr("Mật khẩu không khớp");return;}
    if(lPwd===DEFAULT_PWD){setLErr(`Chọn mật khẩu khác "${DEFAULT_PWD}"`);return;}
    const nm=loginModal.name;
    persistPlayers({...players,[nm.toLowerCase()]:{...getPlayer(nm),pwd:lPwd,mustChange:false}});
    setLoginModal(null);setLPwd("");setLPwd2("");setLErr("");
    showT("✅ Mật khẩu đã đổi. Chào mừng!");
    if(loginModal?.next) loginModal.next(nm);
  }
  function handleChangePwd(){
    const nm=curUser;
    if(lPwd.length<4){setLErr("Mật khẩu ≥ 4 ký tự");return;}
    if(lPwd!==lPwd2){setLErr("Mật khẩu không khớp");return;}
    if(lPwd===DEFAULT_PWD){setLErr(`Chọn mật khẩu khác "${DEFAULT_PWD}"`);return;}
    persistPlayers({...players,[nm.toLowerCase()]:{...getPlayer(nm),pwd:lPwd,mustChange:false}});
    setLoginModal(null);setLPwd("");setLPwd2("");setLErr("");
    showT("✅ Mật khẩu đã cập nhật!");
  }

  function openPred(m){
    if(!curUser){openLogin({mode:"login",next:()=>{setPredModal(m);setPH("");setPA("");}});return;}
    setPredModal(m);setPH("");setPA("");
  }
  function doPred(){
    const nm=curUser;
    const h=parseInt(pH),a=parseInt(pA);
    if(pH===""||pA===""||isNaN(h)||isNaN(a)||h<0||a<0||h>20||a>20){showT("Tỷ số không hợp lệ!","err");return;}
    const m=data.matches.find(x=>x.id===predModal.id);
    if(m.status==="finished"){showT("Trận đã kết thúc!","err");return;}
    const existing=m.preds.find(p=>p.name.toLowerCase()===nm.toLowerCase());
    if(existing){
      if((existing.changes||0)>=MAX_CHG){showT(`Hết ${MAX_CHG} lần đổi!`,"err");return;}
      const others=m.preds.filter(p=>p.name.toLowerCase()!==nm.toLowerCase());
      if(others.filter(p=>p.h===h&&p.a===a).length>=MAX_SAME){showT(`Tỷ số ${h}-${a} đủ ${MAX_SAME} người!`,"err");return;}
      const changes=(existing.changes||0)+1;
      const newMs=data.matches.map(x=>x.id===m.id?{...x,preds:x.preds.map(p=>p.name.toLowerCase()===nm.toLowerCase()?{...p,h,a,changes,ts:Date.now()}:p)}:x);
      persist({...data,matches:newMs});
      setPredModal(null);setPH("");setPA("");showT(`✏️ Đã đổi → ${h}–${a} (${changes}/${MAX_CHG})`);
    } else {
      if(m.preds.filter(p=>p.h===h&&p.a===a).length>=MAX_SAME){showT(`Tỷ số ${h}-${a} đủ ${MAX_SAME} người!`,"err");return;}
      const newMs=data.matches.map(x=>x.id===m.id?{...x,preds:[...x.preds,{name:nm,h,a,changes:0,ts:Date.now()}]}:x);
      persist({...data,matches:newMs});
      setPredModal(null);setPH("");setPA("");showT(`✅ Đặt ${h}–${a} thành công!`);
    }
  }

  function doResult(){
    const h=parseInt(rH),a=parseInt(rA);
    if(isNaN(h)||isNaN(a)||h<0||a<0){showT("Kết quả không hợp lệ!","err");return;}
    const m=data.matches.find(x=>x.id===resultModal.id);
    const{fund,penaltyPool}=calcStats({...m,result:{h,a}},players);
    const newMs=data.matches.map(x=>x.id===m.id?{...x,status:"finished",result:{h,a}}:x);
    persist({...data,matches:newMs,fund:(data.fund||0)+fund});
    setResultModal(null);setRH("");setRA("");
    showT(`✅ KQ ${h}–${a} lưu OK!${penaltyPool>0?` (+${fmt(penaltyPool)} phạt vắng)`:""}`)
  }
  function doTeam(){
    if(!eH.trim()||!eA.trim()){showT("Nhập tên đội!","err");return;}
    persist({...data,matches:data.matches.map(x=>x.id===editTeamModal.id?{...x,home:eH.trim(),away:eA.trim()}:x)});
    setEditTeamModal(null);showT("✅ Cập nhật tên đội OK!");
  }
  function doReset(m){
    const{fund:f}=calcStats(m,players);
    persist({...data,matches:data.matches.map(x=>x.id===m.id?{...x,status:"upcoming",result:null}:x),fund:Math.max(0,(data.fund||0)-f)});
    showT("🔄 Reset KQ xong");
  }
  function doDelPred(matchId,playerName){
    persist({...data,matches:data.matches.map(x=>x.id===matchId?{...x,preds:x.preds.filter(p=>p.name!==playerName)}:x)});
    showT("Đã xóa dự đoán");
  }
  function doSetKickoff(mid,iso){persist({...data,matches:data.matches.map(x=>x.id===mid?{...x,kickoff:iso||null}:x)});}
  function doAdmChangePwd(){
    if(newAdmPwd.length<4){showT("Mật khẩu ≥ 4 ký tự!","err");return;}
    if(newAdmPwd!==newAdmPwd2){showT("Xác nhận không khớp!","err");return;}
    ls.setStr(SK_ADM,newAdmPwd);setAdmPwd(newAdmPwd);
    setAdmChangePwdModal(false);setNewAdmPwd("");setNewAdmPwd2("");showT("✅ Đã đổi MK quản trị!");
  }

  /* ── Player management ── */
  function doAddPlayer(name){
    if(!name.trim()){showT("Nhập tên người chơi!","err");return;}
    const key=name.trim().toLowerCase();
    if(players[key]){showT("Tên đã tồn tại!","err");return;}
    persistPlayers({...players,[key]:{name:name.trim(),pwd:DEFAULT_PWD,mustChange:true,joinedAt:Date.now()}});
    showT(`✅ Đã thêm ${name.trim()}`);
  }
  function doResetPlayerPwd(nm){
    const key=nm.toLowerCase();
    persistPlayers({...players,[key]:{...players[key],pwd:DEFAULT_PWD,mustChange:true}});
    showT(`✅ Reset MK của ${nm} → ${DEFAULT_PWD}`);
  }
  function doDeletePlayer(nm){
    const np={...players};delete np[nm.toLowerCase()];
    persistPlayers(np);showT(`Đã xóa người chơi ${nm}`);
  }
  function doRenamePlayer(oldNm,newNm){
    if(!newNm.trim()||newNm.trim().toLowerCase()===oldNm.toLowerCase())return;
    if(players[newNm.trim().toLowerCase()]){showT("Tên đã tồn tại!","err");return;}
    const np={...players};
    np[newNm.trim().toLowerCase()]={...np[oldNm.toLowerCase()],name:newNm.trim()};
    delete np[oldNm.toLowerCase()];
    // update predictions
    const newMs=data.matches.map(m=>({...m,preds:m.preds.map(p=>p.name.toLowerCase()===oldNm.toLowerCase()?{...p,name:newNm.trim()}:p)}));
    persistPlayers(np);persist({...data,matches:newMs});
    showT(`✅ Đổi tên ${oldNm} → ${newNm.trim()}`);
  }

  /* ── Board & stats ── */
  const allPlayerNames=useMemo(()=>Object.values(players).map(p=>p.name),[players]);

  const board=useMemo(()=>{
    const s={};
    // include all registered players
    allPlayerNames.forEach(n=>{s[n]={name:n,bet:0,won:0,correct:0,n:0,missed:0,penalty:0};});
    data.matches.forEach(m=>{
      if(m.status!=="finished"||!m.result)return;
      const{bet,perW,missed}=calcStats(m,players);
      m.preds.forEach(p=>{
        if(!s[p.name])s[p.name]={name:p.name,bet:0,won:0,correct:0,n:0,missed:0,penalty:0};
        s[p.name].bet+=bet;s[p.name].n++;
        if(p.h===m.result.h&&p.a===m.result.a){s[p.name].won+=perW;s[p.name].correct++;}
      });
      missed.forEach(nm=>{
        const realName=allPlayerNames.find(n=>n.toLowerCase()===nm)||nm;
        if(!s[realName])s[realName]={name:realName,bet:0,won:0,correct:0,n:0,missed:0,penalty:0};
        s[realName].missed++;s[realName].penalty+=bet;s[realName].bet+=bet;
      });
    });
    return Object.values(s).map(x=>({...x,profit:x.won-x.bet-x.penalty})).sort((a,b)=>b.profit-a.profit);
  },[data,players,allPlayerNames]);

  const myPreds=useMemo(()=>{
    if(!curUser)return[];
    const nm=curUser.toLowerCase();
    return data.matches
      .filter(m=>m.preds.some(p=>p.name.toLowerCase()===nm)||(m.status==="finished"&&!m.preds.some(p=>p.name.toLowerCase()===nm)&&allPlayerNames.some(n=>n.toLowerCase()===nm)))
      .map(m=>{
        const p=m.preds.find(p=>p.name.toLowerCase()===nm);
        const st=m.status==="finished"?calcStats(m,players):null;
        const missed=!p&&m.status==="finished";
        return{m,p,st,missed};
      })
      .filter(x=>x.p||x.missed);
  },[data,curUser,players,allPlayerNames]);

  const myStats=useMemo(()=>{
    if(!curUser)return null;
    const nm=curUser.toLowerCase();
    let totalBet=0,totalWon=0,correct=0,finished=0,missed=0,penalty=0,pending=0;
    myPreds.forEach(({m,p,st,missed:ms})=>{
      const bet=PHASES[m.phase].bet;
      if(ms){missed++;penalty+=bet;totalBet+=bet;}
      else if(p&&st){
        totalBet+=bet;finished++;
        if(p.h===m.result?.h&&p.a===m.result?.a){correct++;totalWon+=st.perW;}
      } else if(p&&!st){pending++;}
    });
    return{totalBet,totalWon,correct,finished,missed,penalty,pending,profit:totalWon-totalBet-penalty};
  },[myPreds,curUser]);

  const filtered=useMemo(()=>{
    let ms=data.matches.filter(m=>m.phase===phase);
    if(phase==="group")ms=ms.filter(m=>m.group===grp);
    return ms;
  },[data,phase,grp,tick]);

  const totals=useMemo(()=>({
    pool:data.matches.reduce((s,m)=>s+m.preds.length*PHASES[m.phase].bet,0),
    players:allPlayerNames.length,
    finished:data.matches.filter(m=>m.status==="finished").length,
    preds:data.matches.reduce((s,m)=>s+m.preds.length,0),
    total:data.matches.length,
  }),[data,allPlayerNames]);

  const todayMs=useMemo(()=>data.matches.filter(m=>m.kickoff&&isToday(m.kickoff)&&m.status!=="finished"),[data,tick]);

  /* ══════════════════ STYLES ═════════════════════════════════════════════ */
  const C={bg:"#050c1a",sur:"#091525",card:"#0c1c32",border:"#163050",green:"#00d97e",gold:"#ffca28",red:"#ff5252",blue:"#4fc3f7",orange:"#ff9800",text:"#ddeeff",muted:"#52708f",dim:"#1e3454",purple:"#b388ff"};
  const IS=(x={})=>({background:"#060f20",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.text,padding:"10px 14px",fontFamily:"'Times New Roman',Times,serif",fontSize:"14px",width:"100%",outline:"none",...x});
  const BT=(c="green",x={})=>({background:c==="green"?C.green:c==="gold"?C.gold:c==="red"?C.red:c==="blue"?C.blue:c==="orange"?C.orange:c==="purple"?C.purple:C.dim,color:c==="dim"?C.muted:"#000",border:"none",borderRadius:"8px",padding:"9px 18px",cursor:"pointer",fontWeight:700,fontFamily:"'Times New Roman',Times,serif",fontSize:"13px",...x});
  const CS=(x={})=>({background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"16px",...x});
  const OV={position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"16px"};
  const MD=(x={})=>({...CS(),maxWidth:"440px",width:"100%",animation:"sU .2s ease",...x});

  /* ══════════════════ EXCEL EXPORT ═══════════════════════════════════════ */
  function exportExcel(){
    // Sheet 1: Bảng xếp hạng
    const rankData=board.map((p,i)=>({
      "Hạng":i+1,"Tên":p.name,
      "Số trận tham gia":p.n,"Dự đoán đúng":p.correct,
      "Tỷ lệ đúng (%)":p.n?Math.round(p.correct/p.n*100):0,
      "Trận bỏ lỡ":p.missed,"Tiền phạt (₫)":p.penalty,
      "Tổng đặt (₫)":p.bet,"Tổng thắng (₫)":p.won,
      "Lãi/Lỗ (₫)":p.profit,
    }));

    // Sheet 2: Chi tiết từng trận
    const matchData=[];
    data.matches.filter(m=>m.status==="finished").forEach(m=>{
      const st=calcStats(m,players);
      m.preds.forEach(p=>{
        const isW=p.h===m.result?.h&&p.a===m.result?.a;
        matchData.push({
          "Trận":m.id,"Vòng":PHASES[m.phase].label,"Bảng":m.group||"",
          "Đội nhà":m.home,"Đội khách":m.away,
          "Kết quả":m.result?`${m.result.h}-${m.result.a}`:"",
          "Giờ đấu":fmtDT(m.kickoff)||"","Người dự đoán":p.name,
          "Dự đoán":p?`${p.h}-${p.a}`:"","Đúng/Sai":isW?"✓Đúng":"✗Sai",
          "Số lần đổi":p.changes||0,"Tiền cược (₫)":PHASES[m.phase].bet,
          "Thưởng (₫)":isW?st.perW:0,
        });
      });
      // bỏ lỡ
      st.missed.forEach(nm=>{
        const realName=allPlayerNames.find(n=>n.toLowerCase()===nm)||nm;
        matchData.push({
          "Trận":m.id,"Vòng":PHASES[m.phase].label,"Bảng":m.group||"",
          "Đội nhà":m.home,"Đội khách":m.away,
          "Kết quả":m.result?`${m.result.h}-${m.result.a}`:"",
          "Giờ đấu":fmtDT(m.kickoff)||"","Người dự đoán":realName,
          "Dự đoán":"(bỏ lỡ)","Đúng/Sai":"⚠ Phạt",
          "Số lần đổi":0,"Tiền cược (₫)":PHASES[m.phase].bet,"Thưởng (₫)":0,
        });
      });
    });

    // Sheet 3: Danh sách người chơi
    const playerData=Object.values(players).map(p=>({
      "Tên":p.name,
      "Ngày tham gia":p.joinedAt?new Date(p.joinedAt).toLocaleDateString("vi-VN"):"",
      "Trạng thái MK":p.mustChange?"Chưa đổi MK":"Đã đổi MK",
    }));

    // Sheet 4: Tổng quỹ
    const fundData=[
      {"Chỉ số":"Tổng người chơi","Giá trị":allPlayerNames.length},
      {"Chỉ số":"Tổng dự đoán","Giá trị":totals.preds},
      {"Chỉ số":"Trận đã kết thúc","Giá trị":totals.finished},
      {"Chỉ số":"Tổng pool tiền cược (₫)","Giá trị":totals.pool},
      {"Chỉ số":"Quỹ chung tích lũy (₫)","Giá trị":data.fund||0},
    ];

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rankData),"Xếp hạng");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(matchData),"Chi tiết trận");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(playerData),"Người chơi");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(fundData),"Tổng quỹ");
    XLSX.writeFile(wb,`WC2026_BaoCao_${new Date().toLocaleDateString("vi-VN").replace(/\//g,"-")}.xlsx`);
    showT("✅ Xuất Excel thành công!");
  }

  /* ══════════════════ MATCH CARD ══════════════════════════════════════════ */
  function MatchCard({m,adminMode=false}){
    const st=calcStats(m,players);
    const nm=curUser.toLowerCase();
    const myP=nm?m.preds.find(p=>p.name.toLowerCase()===nm):null;
    const isW=myP&&m.result&&myP.h===m.result.h&&myP.a===m.result.a;
    const done=m.status==="finished";
    const today=!done&&m.kickoff&&isToday(m.kickoff);
    const soon=!done&&m.kickoff&&isSoon(m.kickoff);
    const remCh=myP?MAX_CHG-(myP.changes||0):MAX_CHG;
    let bColor=C.border;
    if(isW)bColor=C.gold;
    else if(soon)bColor=C.red+"aa";
    else if(today)bColor=C.orange+"99";
    else if(myP)bColor=C.green+"55";

    return(
      <div className={"mc"+(today?" today-card":"")}
        style={{...CS({marginBottom:"10px",borderColor:bColor,cursor:!done&&!adminMode?"pointer":"default",animation:"fI .25s ease"}),transition:"border-color .15s"}}
        onClick={()=>{if(!done&&!adminMode)openPred(m);}}>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"7px",flexWrap:"wrap",gap:"4px"}}>

            <span style={{background:C.dim,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",color:C.muted,fontWeight:600}}>
              {PHASES[m.phase].label}{m.group?` • Bảng ${m.group}`:`• ${m.id}`}
            </span>
            {done&&<span style={{background:C.green+"22",color:C.green,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",fontWeight:700,border:`1px solid ${C.green}44`}}>✅ KẾT THÚC</span>}
            {!done&&soon&&<span style={{background:C.red+"22",color:C.red,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",fontWeight:700,animation:"pulse 1.4s infinite"}}>⚡ SẮP ĐÁ</span>}
            {!done&&today&&!soon&&<span style={{background:C.orange+"22",color:C.orange,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",fontWeight:700}}>🔥 HÔM NAY</span>}
          </div>
          <span style={{color:C.gold,fontSize:"13px",fontWeight:700}}>{fmt(PHASES[m.phase].bet)}</span>
        </div>

        {m.kickoff&&<div style={{fontSize:"11px",color:today?C.orange:C.muted,marginBottom:"7px",fontWeight:today?700:400}}>

            {done?`${m.result.h} – ${m.result.a}`:"VS"}

        <div style={{display:"flex",gap:"10px",fontSize:"12px",color:C.muted,flexWrap:"wrap"}}>
          <span>👥 {m.preds.length} dự đoán</span>

              <span style={{color:C.muted,fontSize:"12px"}}>Dự đoán của bạn</span>

      </div>
    );
  }

  /* ══════════════════ TAB: STATS ════════════════════════════════════════ */
  function TabStats(){
    const byPhase=Object.entries(PHASES).map(([ph,{label,bet}])=>{
      const ms=data.matches.filter(m=>m.phase===ph);
      const done=ms.filter(m=>m.status==="finished");
      const pool=ms.reduce((s,m)=>s+m.preds.length*bet,0);
      return{ph,label,bet,total:ms.length,done:done.length,pool,preds:ms.reduce((s,m)=>s+m.preds.length,0)};
    }).filter(x=>x.preds>0||x.done>0);
    return(
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"9px",marginBottom:"15px"}}>
          {[
            {label:"Người chơi",value:totals.players,color:C.blue},
            {label:"Tổng dự đoán",value:totals.preds,color:C.green},
            {label:"Trận xong",value:`${totals.finished}/${totals.total}`,color:C.gold},
            {label:"Tổng pool",value:fmt(totals.pool),color:C.orange},
            {label:"Quỹ chung",value:fmt(data.fund||0),color:C.red},
          ].map(({label,value,color})=>(
            <div key={label} style={{...CS({textAlign:"center"})}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"3px",textTransform:"uppercase",letterSpacing:".7px"}}>{label}</div>
              <div style={{color,fontSize:"clamp(12px,2vw,15px)",fontWeight:700}}>{value}</div>
            </div>
          ))}
        </div>
        {byPhase.length>0&&(
          <div style={{...CS({marginBottom:"15px"})}}>
            <div style={{color:C.muted,fontSize:"11px",marginBottom:"13px",textTransform:"uppercase",letterSpacing:"1px"}}>Theo Vòng Đấu</div>
            {byPhase.map((x,i)=>(
              <div key={x.ph} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<byPhase.length-1?`1px solid ${C.border}`:undefined}}>
                <div>
                  <div style={{fontWeight:600,fontSize:"14px"}}>{x.label}</div>
                  <div style={{color:C.muted,fontSize:"11px",marginTop:"2px"}}>{x.done}/{x.total} trận · {x.preds} dự đoán</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:C.gold,fontWeight:700}}>{fmt(x.pool)}</div>
                  <div style={{color:C.muted,fontSize:"11px"}}>{fmt(x.bet)}/trận</div>
                </div>
              </div>
            ))}
          </div>
        )}
        {board.length>0&&(
          <div style={CS()}>
            <div style={{color:C.muted,fontSize:"11px",marginBottom:"11px",textTransform:"uppercase",letterSpacing:"1px"}}>Top Đúng Nhiều Nhất</div>
            {[...board].sort((a,b)=>b.correct-a.correct).slice(0,5).map((p,i)=>(
              <div key={p.name} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<4?`1px solid ${C.border}`:undefined}}>
                <span style={{color:C.text}}>{i+1}. {p.name}</span>
                <div style={{display:"flex",gap:"12px"}}>
                  <span style={{color:C.green,fontWeight:700}}>{p.correct} đúng</span>
                  <span style={{color:C.muted,fontSize:"12px"}}>{p.n?Math.round(p.correct/p.n*100):0}%</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

      <div style={{maxWidth:"320px",margin:"60px auto"}}>
        <div style={{...CS({textAlign:"center"})}}>
          <div style={{fontSize:"36px",marginBottom:"11px"}}>🔑</div>

          <input style={{...IS({textAlign:"center",letterSpacing:"4px",marginBottom:"11px"})}} type="password" placeholder="Mật khẩu quản trị"
            value={apInput} onChange={e=>setApInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&(apInput===admPwd?setAdmUnlocked(true):showT("Sai mật khẩu!","err"))}/>
          <button style={{...BT("gold"),width:"100%"}} onClick={()=>apInput===admPwd?setAdmUnlocked(true):showT("Sai mật khẩu!","err")}>Đăng nhập</button>
          <div style={{marginTop:"9px",color:C.muted,fontSize:"11px"}}>Mật khẩu mặc định: {DEFAULT_PWD}</div>
        </div>
      </div>
    );

    const subTabs=[
      {id:"matches",label:"⚽ Trận đấu"},
      {id:"players",label:"👥 Người chơi"},
      {id:"report", label:"📊 Báo cáo"},

    return(

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"7px"}}>

          <div style={{display:"flex",gap:"7px"}}>
            <button style={{...BT("blue"),padding:"6px 12px",fontSize:"12px"}} onClick={()=>{setNewAdmPwd("");setNewAdmPwd2("");setAdmChangePwdModal(true);}}>🔐 Đổi MK QT</button>
            <button style={{...BT("dim"),color:C.muted,padding:"6px 10px",fontSize:"12px"}} onClick={()=>setAdmUnlocked(false)}>Đăng xuất</button>
          </div>
        </div>

        {/* Sub-tabs */}
        <div style={{display:"flex",gap:"6px",marginBottom:"16px"}}>
          {subTabs.map(t=><button key={t.id} className="pill" style={{...BT(t.id===admSubTab?"gold":"dim"),padding:"7px 14px",fontSize:"13px",color:t.id===admSubTab?"#000":C.muted}} onClick={()=>setAdmSubTab(t.id)}>{t.label}</button>)}
        </div>

        {/* ── Matches sub-tab ── */}
        {admSubTab==="matches"&&<>
          <PhaseFilter hl="gold"/>
          {phase==="group"&&<div style={{display:"flex",gap:"6px",marginBottom:"13px",flexWrap:"wrap"}}>
            {Object.keys(GROUPS).map(g=>(
              <button key={g} className="pill" style={{...BT(g===grp?"gold":"dim"),padding:"5px 10px",fontSize:"12px",color:g===grp?"#000":C.muted}} onClick={()=>setGrp(g)}>Bảng {g}</button>
            ))}
          </div>}
          {filtered.map(m=><MatchCard key={m.id} m={m} adminMode={true}/>)}
        </>}

        {/* ── Players sub-tab ── */}
        {admSubTab==="players"&&<>
          {/* Add player */}
          <div style={{...CS({marginBottom:"14px",borderColor:C.green+"40"})}}>
            <div style={{fontWeight:600,color:C.green,fontSize:"13px",marginBottom:"10px"}}>➕ Thêm người chơi</div>
            <div style={{display:"flex",gap:"8px"}}>
              <input style={IS({flex:1})} placeholder="Nhập tên người chơi…" value={newPlayerName} onChange={e=>setNewPlayerName(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&(doAddPlayer(newPlayerName),setNewPlayerName(""))}/>
              <button style={BT("green")} onClick={()=>{doAddPlayer(newPlayerName);setNewPlayerName("");}}>Thêm</button>
            </div>
            <div style={{color:C.muted,fontSize:"11px",marginTop:"5px"}}>Mật khẩu mặc định <b style={{color:C.gold}}>{DEFAULT_PWD}</b> · người chơi phải đổi ngay lần đầu đăng nhập</div>
          </div>

          {/* Player list */}
          <div style={CS()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
              <div style={{color:C.muted,fontSize:"11px",textTransform:"uppercase",letterSpacing:"1px"}}>Danh sách người chơi ({allPlayerNames.length})</div>
            </div>
            {Object.values(players).length===0&&<div style={{color:C.muted,textAlign:"center",padding:"20px"}}>Chưa có người chơi nào</div>}
            {Object.values(players).map((p,i)=>{
              const bStats=board.find(b=>b.name.toLowerCase()===p.name.toLowerCase());
              const isEditing=editingPlayer?.name===p.name;
              return(
                <div key={p.name} style={{padding:"10px 0",borderBottom:i<Object.values(players).length-1?`1px solid ${C.border}`:undefined}}>
                  {isEditing?(
                    <div style={{display:"flex",gap:"7px",alignItems:"center",flexWrap:"wrap"}}>
                      <input style={{...IS({flex:1,minWidth:"120px",padding:"7px 10px"})}} value={editingPlayer.newName}
                        onChange={e=>setEditingPlayer({...editingPlayer,newName:e.target.value})}
                        onKeyDown={e=>{if(e.key==="Enter"){doRenamePlayer(p.name,editingPlayer.newName);setEditingPlayer(null);}if(e.key==="Escape")setEditingPlayer(null);}}/>
                      <button style={{...BT("green"),padding:"6px 12px",fontSize:"12px"}} onClick={()=>{doRenamePlayer(p.name,editingPlayer.newName);setEditingPlayer(null);}}>✓ Lưu</button>
                      <button style={{...BT("dim"),color:C.muted,padding:"6px 10px",fontSize:"12px"}} onClick={()=>setEditingPlayer(null)}>Hủy</button>
                    </div>
                  ):(
                    <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:"120px"}}>
                        <div style={{fontWeight:600,fontSize:"14px"}}>{p.name}</div>
                        <div style={{color:C.muted,fontSize:"11px",marginTop:"2px",display:"flex",gap:"8px",flexWrap:"wrap"}}>
                          <span>Tham gia: {p.joinedAt?new Date(p.joinedAt).toLocaleDateString("vi-VN"):"-"}</span>
                          <span style={{color:p.mustChange?C.orange:C.muted}}>{p.mustChange?"⚠ Chưa đổi MK":"🔒 Đã đổi MK"}</span>
                          {bStats&&<span style={{color:bStats.profit>=0?C.green:C.red}}>{bStats.profit>=0?"+":""}{fmt(bStats.profit)}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:"5px",flexWrap:"wrap"}}>
                        <button style={{...BT("dim"),color:C.blue,padding:"4px 9px",fontSize:"11px"}} onClick={()=>setEditingPlayer({name:p.name,newName:p.name})}>✏️</button>
                        <button style={{...BT("dim"),color:C.orange,padding:"4px 9px",fontSize:"11px"}} onClick={()=>{if(window.confirm(`Reset mật khẩu của ${p.name} → ${DEFAULT_PWD}?`))doResetPlayerPwd(p.name);}}>🔑 Reset MK</button>
                        <button style={{...BT("dim"),color:C.red,padding:"4px 9px",fontSize:"11px"}} onClick={()=>{if(window.confirm(`Xóa người chơi ${p.name}?`))doDeletePlayer(p.name);}}>🗑</button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>}

        {/* ── Report sub-tab ── */}
        {admSubTab==="report"&&<>
          <div style={{...CS({marginBottom:"14px",borderColor:C.green+"40",background:C.green+"07"})}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
              <div>
                <div style={{fontWeight:700,color:C.green,fontSize:"14px"}}>📊 Xuất Báo Cáo Excel</div>
                <div style={{color:C.muted,fontSize:"12px",marginTop:"3px"}}>Bao gồm: Xếp hạng · Chi tiết trận · Người chơi · Tổng quỹ</div>
              </div>
              <button style={{...BT("green"),padding:"10px 20px"}} onClick={exportExcel}>⬇ Tải Excel</button>
            </div>
          </div>

          {/* Summary stats */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"9px",marginBottom:"14px"}}>
            {[
              {label:"Người chơi",value:allPlayerNames.length,color:C.blue},
              {label:"Trận xong",value:`${totals.finished}/${totals.total}`,color:C.gold},
              {label:"Tổng pool",value:fmt(totals.pool),color:C.orange},
              {label:"Quỹ chung",value:fmt(data.fund||0),color:C.red},
            ].map(({label,value,color})=>(
              <div key={label} style={{...CS({textAlign:"center"})}}>
                <div style={{color:C.muted,fontSize:"11px",marginBottom:"3px",textTransform:"uppercase",letterSpacing:".7px"}}>{label}</div>
                <div style={{color,fontSize:"14px",fontWeight:700}}>{value}</div>
              </div>
            ))}
          </div>

          {/* Full player table */}
          <div style={{...CS({padding:"0",overflowX:"auto"})}}>
            <table>
              <thead>
                <tr style={{background:C.sur}}>
                  {["#","Tên","Trận","Đúng","%","Bỏ lỡ","Phạt","Thắng","Lãi/Lỗ"].map(h=>(
                    <th key={h} style={{color:C.muted,borderBottom:`1px solid ${C.border}`,padding:"10px 10px"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {board.map((p,i)=>(
                  <tr key={p.name} style={{background:i%2===0?C.card:C.sur+"88",borderBottom:`1px solid ${C.border}`}}>
                    <td style={{color:i===0?C.gold:i===1?"#aaa":i===2?"#cd7f32":C.muted,fontWeight:700}}>{i+1}</td>
                    <td style={{color:C.text,fontWeight:600}}>{p.name}</td>
                    <td style={{color:C.muted}}>{p.n}</td>
                    <td style={{color:C.green,fontWeight:700}}>{p.correct}</td>
                    <td style={{color:C.muted}}>{p.n?Math.round(p.correct/p.n*100):0}%</td>
                    <td style={{color:p.missed>0?C.orange:C.muted}}>{p.missed}</td>
                    <td style={{color:p.penalty>0?C.orange:C.muted}}>{fmt(p.penalty)}</td>
                    <td style={{color:C.green}}>{fmt(p.won)}</td>
                    <td style={{color:p.profit>=0?C.green:C.red,fontWeight:700}}>{p.profit>=0?"+":""}{fmt(p.profit)}</td>
                  </tr>
                ))}

            </table>
          </div>
        </>}
      </div>

  /* ══════════════════ LOGIN MODAL ════════════════════════════════════════ */
  // Dùng uncontrolled inputs + refs để KHÔNG re-render khi gõ → hết giật/nhảy
  function LoginModal(){
    if(!loginModal)return null;
    const{mode}=loginModal;
    const isForce=mode==="forcepwd", isChange=mode==="changepwd", isLogin=mode==="login";
    const knownNames=Object.values(players).map(p=>p.name);

    // Refs để đọc giá trị mà không setState mỗi keystroke
    const refName=useRef(null);
    const refPwd =useRef(null);
    const refPwd2=useRef(null);

    function closeModal(){
      if(isForce)return;
      setLoginModal(null);setLErr("");
    }

    function doSubmit(){
      // Lấy giá trị trực tiếp từ DOM
      const nm =(refName.current?.value||"").trim();
      const pwd= refPwd.current?.value||"";
      const pwd2=refPwd2.current?.value||"";
      if(isLogin){
        if(!nm){setLErr("Nhập tên của bạn");return;}
        if(!pwd){setLErr("Nhập mật khẩu");return;}
        if(!isRegistered(nm)){
          if(pwd!==DEFAULT_PWD){setLErr("Lần đầu dùng mật khẩu mặc định: "+DEFAULT_PWD);return;}
          const np={...players,[nm.toLowerCase()]:{name:nm,pwd:DEFAULT_PWD,mustChange:true,joinedAt:Date.now()}};
          persistPlayers(np);saveSession(nm);
          setLoginModal({mode:"forcepwd",name:nm});setLErr("");return;
        }
        const p=getPlayer(nm);
        if(p.pwd!==pwd){setLErr("Sai mật khẩu!");return;}
        saveSession(nm);
        if(p.mustChange){setLoginModal({mode:"forcepwd",name:nm});setLErr("");return;}
        setLoginModal(null);setLErr("");
        showT("✅ Chào "+nm+"!");
        if(loginModal?.next) loginModal.next(nm);
      } else if(isForce||isChange){
        if(pwd.length<4){setLErr("Mật khẩu ≥ 4 ký tự");return;}
        if(pwd!==pwd2){setLErr("Mật khẩu không khớp");return;}
        if(pwd===DEFAULT_PWD){setLErr("Chọn mật khẩu khác "+DEFAULT_PWD);return;}
        const nm2=isChange?curUser:loginModal.name;
        persistPlayers({...players,[nm2.toLowerCase()]:{...getPlayer(nm2),pwd:pwd,mustChange:false}});
        setLoginModal(null);setLErr("");
        showT(isChange?"✅ Mật khẩu đã cập nhật!":"✅ Mật khẩu đã đổi. Chào mừng!");
        if(loginModal?.next) loginModal.next(nm2);
      }
    }

    // Style input — KHÔNG dùng value/onChange để tránh re-render
    const INP=(extra={})=>({
      background:"#0a1929",
      border:"2px solid "+C.border,
      borderRadius:"10px",
      color:"#ffffff",
      padding:"13px 16px",
      fontFamily:"'Times New Roman',Times,serif",
      fontSize:"16px",
      width:"100%",
      outline:"none",
      WebkitBoxShadow:"0 0 0 1000px #0a1929 inset",
      WebkitTextFillColor:"#ffffff",
      caretColor:"#ffffff",
      ...extra,
    });
    const LABEL={color:C.muted,fontSize:"13px",fontWeight:600,marginBottom:"6px",display:"block",fontFamily:"'Times New Roman',Times,serif"};

    return(
      <div style={OV} onClick={closeModal}>
        <div style={MD({maxWidth:"420px",padding:"26px"})} onClick={e=>e.stopPropagation()}>

          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"22px"}}>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"26px",color:isForce||isChange?C.blue:C.green,letterSpacing:"1px"}}>
              {isForce?"🔑 ĐỔI MẬT KHẨU LẦN ĐẦU":isChange?"🔑 ĐỔI MẬT KHẨU":"👤 ĐĂNG NHẬP"}
            </div>
            {!isForce&&(
              <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"28px",cursor:"pointer",lineHeight:1,padding:"0 4px"}} onClick={closeModal}>×</button>
            )}
          </div>

          {/* Force-change banner */}
          {isForce&&(
            <div style={{background:C.gold+"15",border:"1px solid "+C.gold+"44",borderRadius:"10px",padding:"12px 14px",marginBottom:"18px",fontSize:"13px",color:C.muted,lineHeight:1.7,fontFamily:"'Times New Roman',Times,serif"}}>
              ⚠️ Bạn đang dùng mật khẩu mặc định <b style={{color:C.gold,fontSize:"15px"}}>{DEFAULT_PWD}</b>.<br/>
              Hãy đặt mật khẩu riêng để bảo vệ tài khoản <b style={{color:C.text}}>{loginModal.name}</b>.
            </div>
          )}

          {/* Name field */}
          {isLogin&&(
            <div style={{marginBottom:"18px"}}>
              <label style={LABEL}>Tên của bạn</label>
              <datalist id="wc-names-list">
                {knownNames.map(n=><option key={n} value={n}/>)}
              </datalist>
              <input
                ref={refName}
                list="wc-names-list"
                defaultValue=""
                style={INP()}
                placeholder="Nhập tên đầy đủ của bạn…"
                autoComplete="username"
                onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();refPwd.current?.focus();}}}
              />
              <div style={{color:C.muted,fontSize:"12px",marginTop:"7px",fontFamily:"'Times New Roman',Times,serif"}}>
                💡 Lần đầu dùng mật khẩu mặc định: <b style={{color:C.gold,fontSize:"13px"}}>{DEFAULT_PWD}</b>
              </div>
            </div>
          )}

          {/* Password */}
          <div style={{marginBottom:"18px"}}>
            <label style={LABEL}>{isLogin?"Mật khẩu":"Mật khẩu mới (tối thiểu 4 ký tự)"}</label>
            <input
              ref={refPwd}
              type="password"
              defaultValue=""
              style={INP({letterSpacing:"4px",fontSize:"20px"})}
              placeholder={isLogin?"••••••••":"Mật khẩu mới…"}
              autoComplete={isLogin?"current-password":"new-password"}
              autoFocus={isForce||isChange}
              onKeyDown={e=>{
                if(e.key==="Enter"){
                  e.preventDefault();
                  if(isLogin) doSubmit();
                  else refPwd2.current?.focus();
                }
              }}
            />
          </div>

          {/* Confirm password */}
          {(isForce||isChange)&&(
            <div style={{marginBottom:"18px"}}>
              <label style={LABEL}>Xác nhận mật khẩu</label>
              <input
                ref={refPwd2}
                type="password"
                defaultValue=""
                style={INP({letterSpacing:"4px",fontSize:"20px"})}
                placeholder="Nhập lại mật khẩu…"
                autoComplete="new-password"
                onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();doSubmit();}}}
              />
            </div>
          )}

          {/* Error */}
          {lErr&&(
            <div style={{background:C.red+"18",border:"1px solid "+C.red+"55",borderRadius:"8px",padding:"11px 14px",marginBottom:"16px",color:C.red,fontSize:"14px",fontWeight:600,fontFamily:"'Times New Roman',Times,serif"}}>
              ⚠️ {lErr}
            </div>
          )}

          {/* Actions */}
          <div style={{display:"grid",gridTemplateColumns:isForce?"1fr":"1fr 1fr",gap:"12px"}}>
            {!isForce&&(
              <button style={{...BT("dim"),color:C.muted,padding:"13px",fontSize:"14px",fontFamily:"'Times New Roman',Times,serif"}} onClick={closeModal}>Hủy</button>
            )}
            <button
              style={{...BT(isForce||isChange?"blue":"green"),padding:"14px",fontSize:"16px",fontWeight:700,fontFamily:"'Times New Roman',Times,serif"}}
              onClick={doSubmit}>
              {isForce?"💾 Lưu & Tiếp tục":isChange?"💾 Lưu mật khẩu":"Đăng nhập →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ══════════════════ PREDICTION MODAL ══════════════════════════════════ */
  const livePred=predModal?data.matches.find(x=>x.id===predModal.id):null;
  const scoreCounts=livePred?livePred.preds.reduce((acc,p)=>{const k=`${p.h}-${p.a}`;acc[k]=(acc[k]||0)+1;return acc;},{}):{}; 
  const myExisting=livePred&&curUser?livePred.preds.find(p=>p.name.toLowerCase()===curUser.toLowerCase()):null;

  const TABS=[
    {id:"guide",  label:"📖 Hướng Dẫn"},
    {id:"matches",label:"⚽ Trận Đấu"},
    {id:"mine",   label:"👤 Của Tôi"},
    {id:"board",  label:"🏆 Xếp Hạng"},
    {id:"stats",  label:"📊 Thống Kê"},
    {id:"admin",  label:"🔑 Quản Trị"},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'Times New Roman',Times,serif",fontSize:"14px"}}>

      {/* HEADER */}
      <div style={{background:"#060f24",borderBottom:`2px solid #0e2a4a`,padding:"11px 16px"}}>
        <div style={{maxWidth:"960px",margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"9px"}}>
            <div>
              <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"clamp(21px,4vw,29px)",color:C.green,letterSpacing:"3px",lineHeight:1}}>⚽ World Cup 2026</div>
              <div style={{color:C.muted,fontSize:"10px",letterSpacing:"2px",marginTop:"2px"}}>DỰ ĐOÁN · {MAX_SAME} NGƯỜI/TỶ SỐ · ĐỔI {MAX_CHG} LẦN · 85% THƯỞNG · 15% QUỸ</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
              {curUser?(
                <div style={{display:"flex",gap:"7px",alignItems:"center"}}>
                  <div style={{background:C.green+"15",border:`1px solid ${C.green}40`,borderRadius:"8px",padding:"6px 13px",color:C.green,fontWeight:600,fontSize:"13px"}}>👤 {curUser}</div>
                  <button style={{...BT("dim"),padding:"6px 10px",fontSize:"12px",color:C.muted}} onClick={logout}>Đăng xuất</button>
                </div>
              ):(
                <button style={{...BT("green"),padding:"8px 16px",fontSize:"13px"}} onClick={()=>openLogin()}>👤 Đăng nhập</button>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* MARQUEE BANNER */}
      <div style={{background:"#0a0000",borderBottom:"2px solid #ff0000",overflow:"hidden",padding:"7px 0"}}>
        <div style={{
          display:"inline-block",
          whiteSpace:"nowrap",
          animation:"marquee 22s linear infinite",
          color:"#ff3333",
          fontWeight:700,
          fontSize:"clamp(12px,2vw,15px)",
          fontFamily:"'Times New Roman',Times,serif",
          letterSpacing:"0.5px",
        }}>
          &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;⚠️&nbsp;ĐÂY KHÔNG PHẢI LÀ ỨNG DỤNG CÁ CƯỢC &nbsp;·&nbsp; ỨNG DỤNG CHỈ ĐỂ DÙNG NỘI BỘ DỰ ĐOÁN GIẢI TRÍ VUI VẺ!&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;⚠️&nbsp;ĐÂY KHÔNG PHẢI LÀ ỨNG DỤNG CÁ CƯỢC &nbsp;·&nbsp; ỨNG DỤNG CHỈ ĐỂ DÙNG NỘI BỘ DỰ ĐOÁN GIẢI TRÍ VUI VẺ!&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;⚠️&nbsp;ĐÂY KHÔNG PHẢI LÀ ỨNG DỤNG CÁ CƯỢC &nbsp;·&nbsp; ỨNG DỤNG CHỈ ĐỂ DÙNG NỘI BỘ DỰ ĐOÁN GIẢI TRÍ VUI VẺ!
        </div>
      </div>

      {/* TABS */}
      <div style={{background:C.sur,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
        <div style={{maxWidth:"960px",margin:"0 auto",display:"flex"}}>
          {TABS.map(t=>(
            <button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)}
              style={{padding:"12px 13px",cursor:"pointer",color:tab===t.id?C.green:C.muted,borderBottom:`2px solid ${tab===t.id?C.green:"transparent"}`,fontWeight:600,fontSize:"12px",whiteSpace:"nowrap",background:"transparent",border:"none",fontFamily:"'Times New Roman',Times,serif",transition:"color .15s"}}>
              {t.label}
              {t.id==="matches"&&todayMs.length>0&&<span style={{marginLeft:"4px",background:C.orange,color:"#000",borderRadius:"10px",padding:"0 5px",fontSize:"10px",fontWeight:700}}>{todayMs.length}</span>}
            </button>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{maxWidth:"960px",margin:"0 auto",padding:"15px"}}>
        {tab==="guide"  &&<TabGuide/>}
        {tab==="matches"&&<TabMatches/>}
        {tab==="mine"   &&<TabMine/>}
        {tab==="board"  &&<TabBoard/>}
        {tab==="stats"  &&<TabStats/>}
        {tab==="admin"  &&<TabAdmin/>}
      </div>

      {/* LOGIN MODAL */}
      <LoginModal/>

      {/* PREDICTION MODAL */}
      {livePred&&(
        <div style={OV} onClick={()=>{setPredModal(null);setPH("");setPA("");}}>
          <div style={MD()} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"15px"}}>
              <div>
                <div style={{color:C.muted,fontSize:"11px",marginBottom:"3px",textTransform:"uppercase",letterSpacing:"1px"}}>{PHASES[livePred.phase].label}{livePred.group?` · Bảng ${livePred.group}`:""}</div>
                <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"clamp(15px,3vw,20px)"}}><span style={{display:"inline-flex",alignItems:"center",gap:"5px"}}><FL name={livePred.home} size={20}/> {livePred.home} vs {livePred.away} <FL name={livePred.away} size={20}/></span></div>
                <div style={{color:C.gold,fontSize:"13px",marginTop:"2px"}}>Mức dự đoán: {fmt(PHASES[livePred.phase].bet)}</div>
                {livePred.kickoff&&<div style={{color:isToday(livePred.kickoff)?C.orange:C.muted,fontSize:"12px",marginTop:"2px"}}>🕐 {fmtDT(livePred.kickoff)} (GMT+7)</div>}
              </div>
              <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer",lineHeight:1}} onClick={()=>{setPredModal(null);setPH("");setPA("");}}>×</button>
            </div>
            {myExisting&&<div style={{background:C.blue+"10",border:`1px solid ${C.blue}30`,borderRadius:"8px",padding:"9px 12px",marginBottom:"13px",fontSize:"12px"}}>
              <div style={{color:C.blue,fontWeight:700,marginBottom:"3px"}}>✏️ Đổi dự đoán</div>
              <div style={{color:C.muted}}>Hiện tại: <b style={{color:C.text,fontFamily:"Bebas Neue,sans-serif",fontSize:"16px"}}>{myExisting.h}–{myExisting.a}</b> · Còn <b style={{color:C.blue}}>{MAX_CHG-(myExisting.changes||0)}</b>/{MAX_CHG} lần</div>
            </div>}
            {Object.keys(scoreCounts).length>0&&<div style={{marginBottom:"13px",background:C.sur,borderRadius:"8px",padding:"11px"}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"7px",textTransform:"uppercase",letterSpacing:"1px"}}>Tỷ số đã có người đặt</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                {Object.entries(scoreCounts).map(([sc,cnt])=>(
                  <span key={sc} style={{background:cnt>=MAX_SAME?C.red+"20":C.green+"15",border:`1px solid ${cnt>=MAX_SAME?C.red:C.green}50`,color:cnt>=MAX_SAME?C.red:C.green,padding:"3px 10px",borderRadius:"20px",fontSize:"13px",fontWeight:700}}>
                    {sc} ({cnt}/{MAX_SAME}){cnt>=MAX_SAME?" ⛔":""}
                  </span>
                ))}
              </div>
            </div>}
            <div style={{marginBottom:"14px"}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"9px",textTransform:"uppercase",letterSpacing:"1px"}}>Tỷ số dự đoán</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:"9px",alignItems:"center"}}>
                <div>
                  <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px",textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><span style={{display:"inline-flex",alignItems:"center",gap:"4px"}}><FL name={livePred.home} size={16}/> {livePred.home}</span></div>
                  <input style={{...IS({textAlign:"center",fontSize:"32px",fontFamily:"Bebas Neue,sans-serif",padding:"10px"})}} type="number" min="0" max="20" placeholder="0" value={pH} onChange={e=>setPH(e.target.value)}/>
                </div>
                <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"26px",color:C.dim,textAlign:"center",paddingTop:"18px"}}>—</div>
                <div>
                  <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px",textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><span style={{display:"inline-flex",alignItems:"center",gap:"4px"}}>{livePred.away} <FL name={livePred.away} size={16}/></span></div>
                  <input style={{...IS({textAlign:"center",fontSize:"32px",fontFamily:"Bebas Neue,sans-serif",padding:"10px"})}} type="number" min="0" max="20" placeholder="0" value={pA} onChange={e=>setPA(e.target.value)}/>
                </div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <button style={{...BT("dim"),color:C.muted}} onClick={()=>{setPredModal(null);setPH("");setPA("");}}>Hủy</button>
              <button style={BT("green")} onClick={doPred}>{myExisting?"✏️ Cập nhật":"✅ Xác nhận dự đoán"}</button>
            </div>
          </div>
        </div>
      )}

      {/* RESULT MODAL */}
      {resultModal&&(
        <div style={OV} onClick={()=>{setResultModal(null);setRH("");setRA("");}}>
          <div style={MD()} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"15px"}}>
              <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"20px",color:C.gold}}>📝 Nhập Kết Quả</div>
              <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={()=>{setResultModal(null);setRH("");setRA("");}}>×</button>
            </div>
            <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"19px",textAlign:"center",marginBottom:"6px"}}><span style={{display:"inline-flex",alignItems:"center",gap:"5px"}}><FL name={resultModal.home} size={20}/> {resultModal.home} vs {resultModal.away} <FL name={resultModal.away} size={20}/></span></div>
            {resultModal.kickoff&&<div style={{color:C.muted,fontSize:"12px",textAlign:"center",marginBottom:"13px"}}>🕐 {fmtDT(resultModal.kickoff)}</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:"9px",alignItems:"center",marginBottom:"15px"}}>
              <input style={{...IS({textAlign:"center",fontSize:"32px",fontFamily:"Bebas Neue,sans-serif"})}} type="number" min="0" placeholder="0" value={rH} onChange={e=>setRH(e.target.value)}/>
              <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"26px",color:C.dim,textAlign:"center"}}>—</div>
              <input style={{...IS({textAlign:"center",fontSize:"32px",fontFamily:"Bebas Neue,sans-serif"})}} type="number" min="0" placeholder="0" value={rA} onChange={e=>setRA(e.target.value)}/>
            </div>
            {rH!==""&&rA!==""&&!isNaN(parseInt(rH))&&!isNaN(parseInt(rA))&&(()=>{
              const h=parseInt(rH),a=parseInt(rA);
              const ms=calcStats({...resultModal,result:{h,a}},players);
              return<div style={{background:C.green+"0f",border:`1px solid ${C.green}22`,borderRadius:"8px",padding:"10px",marginBottom:"13px",fontSize:"12px",color:C.muted,lineHeight:1.7}}>
                Pool: <b style={{color:C.text}}>{fmt(ms.pool)}</b>{ms.penaltyPool>0&&<> + Phạt: <b style={{color:C.orange}}>{fmt(ms.penaltyPool)}</b></>} → Thưởng: <b style={{color:C.green}}>{fmt(ms.prize)}</b> + Quỹ: <b style={{color:C.red}}>{fmt(ms.fund)}</b>
                <br/>Người đúng: <b style={{color:C.gold}}>{ms.winners.length}</b>{ms.perW>0&&<> · Mỗi người: <b style={{color:C.gold}}>{fmt(ms.perW)}</b></>}
                {ms.missed.length>0&&<><br/>Bỏ lỡ (<span style={{color:C.orange}}>{ms.missed.length} người</span>): sẽ bị phạt {fmt(PHASES[resultModal.phase].bet)}/người</>}
              </div>;
            })()}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <button style={{...BT("dim"),color:C.muted}} onClick={()=>{setResultModal(null);setRH("");setRA("");}}>Hủy</button>
              <button style={BT("gold")} onClick={doResult}>💾 Lưu kết quả</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT TEAM MODAL */}
      {editTeamModal&&(
        <div style={OV} onClick={()=>setEditTeamModal(null)}>
          <div style={MD({maxWidth:"360px"})} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"15px"}}>
              <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"20px",color:C.blue}}>✏️ Sửa Tên Đội</div>
              <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={()=>setEditTeamModal(null)}>×</button>
            </div>
            <div style={{marginBottom:"11px"}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"5px"}}>Đội chủ nhà</div>
              <input style={IS()} value={eH} onChange={e=>setEH(e.target.value)} placeholder="Tên đội 1"/>
            </div>
            <div style={{marginBottom:"15px"}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"5px"}}>Đội khách</div>
              <input style={IS()} value={eA} onChange={e=>setEA(e.target.value)} placeholder="Tên đội 2"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <button style={{...BT("dim"),color:C.muted}} onClick={()=>setEditTeamModal(null)}>Hủy</button>
              <button style={BT("blue")} onClick={doTeam}>💾 Lưu</button>
            </div>
          </div>
        </div>
      )}

      {/* ADMIN CHANGE PWD */}
      {admChangePwdModal&&(
        <div style={OV} onClick={()=>setAdmChangePwdModal(false)}>
          <div style={MD({maxWidth:"360px"})} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"15px"}}>
              <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"20px",color:C.gold}}>🔐 Đổi MK Quản Trị</div>
              <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={()=>setAdmChangePwdModal(false)}>×</button>
            </div>
            <div style={{marginBottom:"11px"}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"5px"}}>Mật khẩu mới</div>
              <input style={{...IS(),letterSpacing:"2px"}} type="password" placeholder="Nhập mật khẩu mới" value={newAdmPwd} onChange={e=>setNewAdmPwd(e.target.value)}/>
            </div>
            <div style={{marginBottom:"15px"}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"5px"}}>Xác nhận</div>
              <input style={{...IS(),letterSpacing:"2px"}} type="password" placeholder="Nhập lại" value={newAdmPwd2} onChange={e=>setNewAdmPwd2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doAdmChangePwd()}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
              <button style={{...BT("dim"),color:C.muted}} onClick={()=>setAdmChangePwdModal(false)}>Hủy</button>
              <button style={BT("gold")} onClick={doAdmChangePwd}>💾 Lưu</button>
            </div>
          </div>
        </div>
      )}

      {/* DETAIL MODAL */}
      {detailModal&&(()=>{
        const liveD=data.matches.find(x=>x.id===detailModal.id);
        if(!liveD)return null;
        const ms=calcStats(liveD,players);
        return(
          <div style={OV} onClick={()=>setDetailModal(null)}>
            <div style={MD({maxWidth:"500px",maxHeight:"88vh",overflowY:"auto"})} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"15px"}}>
                <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"20px"}}>📊 Chi Tiết Trận</div>
                <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={()=>setDetailModal(null)}>×</button>
              </div>
              <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"21px",textAlign:"center",marginBottom:"5px"}}><span style={{display:"inline-flex",alignItems:"center",gap:"5px"}}><FL name={liveD.home} size={20}/> {liveD.home}</span> {liveD.result?`${liveD.result.h} – ${liveD.result.a}`:"vs"} <span style={{display:"inline-flex",alignItems:"center",gap:"5px"}}>{liveD.away} <FL name={liveD.away} size={20}/></span></div>
              {liveD.kickoff&&<div style={{color:C.muted,fontSize:"12px",textAlign:"center",marginBottom:"13px"}}>🕐 {fmtDT(liveD.kickoff)} (GMT+7)</div>}
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"8px",marginBottom:"14px"}}>
                {[
                  {l:"Tổng pool",v:fmt(ms.totalPool),c:C.gold},
                  {l:"Quỹ thưởng (85%)",v:fmt(ms.prize),c:C.green},
                  {l:"Quỹ chung (15%)",v:fmt(ms.fund),c:C.red},
                  {l:"Tiền phạt bỏ lỡ",v:fmt(ms.penaltyPool),c:C.orange},
                  {l:"Người đúng",v:ms.winners.length,c:C.blue},
                  {l:"Bỏ lỡ",v:ms.missed.length,c:ms.missed.length>0?C.orange:C.muted},
                ].map(({l,v,c})=>(
                  <div key={l} style={{background:C.sur,borderRadius:"8px",padding:"9px",textAlign:"center"}}>
                    <div style={{color:C.muted,fontSize:"11px",marginBottom:"3px"}}>{l}</div>
                    <div style={{color:c,fontWeight:700,fontSize:"14px"}}>{v}</div>
                  </div>
                ))}
              </div>
              {ms.perW>0&&<div style={{background:C.gold+"10",border:`1px solid ${C.gold}30`,borderRadius:"8px",padding:"9px",textAlign:"center",marginBottom:"14px",color:C.gold,fontWeight:700,fontSize:"14px"}}>+{fmt(ms.perW)} cho mỗi người đúng</div>}

              <div style={{color:C.muted,fontSize:"11px",marginBottom:"9px",textTransform:"uppercase",letterSpacing:"1px"}}>Dự đoán ({liveD.preds.length})</div>
              {liveD.preds.length===0&&<div style={{color:C.dim,textAlign:"center",padding:"14px"}}>Chưa có dự đoán</div>}
              {liveD.preds.map((p,i)=>{
                const isW=liveD.result&&p.h===liveD.result.h&&p.a===liveD.result.a;
                return(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<liveD.preds.length-1?`1px solid ${C.border}`:undefined}}>
                    <div style={{display:"flex",alignItems:"center",gap:"7px"}}>
                      {isW&&<span>🥇</span>}
                      <div><span style={{fontWeight:600}}>{p.name}</span>{p.changes>0&&<span style={{color:C.orange,fontSize:"11px",marginLeft:"5px"}}>↺{p.changes}x</span>}</div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:"9px"}}>
                      <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"18px",color:isW?C.gold:C.text}}>{p.h}–{p.a}</span>
                      {isW&&<span style={{color:C.gold,fontWeight:700,fontSize:"12px"}}>+{fmt(ms.perW)}</span>}
                      {admUnlocked&&<button style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:"5px",color:C.red,fontSize:"11px",cursor:"pointer",padding:"2px 7px"}}
                        onClick={()=>{doDelPred(liveD.id,p.name);setDetailModal({...liveD,preds:liveD.preds.filter(x=>x.name!==p.name)});}}>xóa</button>}
                    </div>
                  </div>
                );
              })}
              {ms.missed.length>0&&<>
                <div style={{color:C.orange,fontSize:"11px",marginTop:"13px",marginBottom:"7px",textTransform:"uppercase",letterSpacing:"1px"}}>Bỏ lỡ — phạt ({ms.missed.length})</div>
                {ms.missed.map((nm,i)=>{
                  const realName=allPlayerNames.find(n=>n.toLowerCase()===nm)||nm;
                  return<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<ms.missed.length-1?`1px solid ${C.border}`:undefined}}>
                    <span style={{color:C.orange}}>⚠ {realName}</span>
                    <span style={{color:C.orange,fontSize:"12px"}}>-{fmt(PHASES[liveD.phase].bet)}</span>
                  </div>;
                })}
              </>}
            </div>
          </div>
        );
      })()}

      {/* TOAST */}
      {toast&&(
        <div style={{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:toast.t==="err"?C.red:C.green,color:"#000",padding:"10px 22px",borderRadius:"30px",fontWeight:700,fontSize:"13px",zIndex:2000,animation:"tIn .2s ease",whiteSpace:"nowrap",boxShadow:"0 6px 24px rgba(0,0,0,.5)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
