<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ World Cup 2026 – Dự Đoán Tỉ Số</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* YÊU CẦU 1 & 5: Chuyển đổi toàn bộ phông chữ sang Times New Roman */
        * {
            font-family: 'Times New Roman', Times, serif !important;
        }
        /* Hiệu ứng chữ chạy màu đỏ mượt mà ở màn hình chính */
        .marquee-container {
            background-color: #ffebeb;
            border-bottom: 1px solid #ffcccc;
            overflow: hidden;
            white-space: nowrap;
            padding: 8px 0;
        }
        .marquee-text {
            display: inline-block;
            color: #dc2626;
            font-weight: bold;
            font-size: 1.1rem;
            animation: marquee 25s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        /* YÊU CẦU 2: Fix lỗi nhảy ô và giật màn hình khi gõ */
        input:focus {
            outline: 2px solid #2563eb !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900">

    <div class="marquee-container">
        <div class="marquee-text">
            ⚠️ Đây không phải là ứng dụng cá cược. Ứng dụng chỉ để dùng nội bộ dự đoán giải trí vui vẻ!
        </div>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Cấu hình mật khẩu Admin mặc định
        const ADMIN_PWD = "12345";

        // Dữ liệu mẫu các trận đấu giải đấu
        const INITIAL_MATCHES = [
            { id: 1, round: "Vòng Bảng", teamA: "Mỹ", teamB: "Mexico", scoreA: null, scoreB: null, time: "15/06/2026 02:00", finished: false },
            { id: 2, round: "Vòng Bảng", teamA: "Canada", teamB: "Argentina", scoreA: null, scoreB: null, time: "16/06/2026 07:00", finished: false },
            { id: 3, round: "Chung Kết", teamA: "Pháp", teamB: "Brazil", scoreA: null, scoreB: null, time: "19/07/2026 23:00", finished: false }
        ];

        function App() {
            // YÊU CẦU 6: Tài khoản và dữ liệu dự đoán của người chơi được lưu trữ bền vững trong localStorage suốt giải đấu
            const [matches, setMatches] = useState(() => {
                const saved = localStorage.getItem('wc_matches');
                return saved ? JSON.parse(saved) : INITIAL_MATCHES;
            });

            const [predictions, setPredictions] = useState(() => {
                const saved = localStorage.getItem('wc_predictions');
                return saved ? JSON.parse(saved) : {};
            });

            // State quản lý việc đăng nhập (Tách biệt state gõ và state lưu trữ để chống giật/nhảy ô)
            const [playerNameInput, setPlayerNameInput] = useState("");
            const [currentPlayer, setCurrentPlayer] = useState(() => {
                return localStorage.getItem('wc_current_player') || "";
            });

            const [isAdmin, setIsAdmin] = useState(false);
            const [adminPassword, setAdminPassword] = useState("");
            const [selectedMatch, setSelectedMatch] = useState(null);
            const [predA, setPredA] = useState("");
            const [predB, setPredB] = useState("");
            
            // Trạng thái thông báo cập nhật hệ thống
            const [lastUpdated, setLastUpdated] = useState(new Date().toLocaleTimeString());

            // Đồng bộ dữ liệu vào cơ sở dữ liệu trình duyệt (localStorage)
            useEffect(() => {
                localStorage.setItem('wc_matches', JSON.stringify(matches));
            }, [matches]);

            useEffect(() => {
                localStorage.setItem('wc_predictions', JSON.stringify(predictions));
            }, [predictions]);

            // YÊU CẦU 8: Hệ thống tự động cập nhật kết quả trận đấu sau mỗi 5 phút (300000ms)
            useEffect(() => {
                const interval = setInterval(() => {
                    setLastUpdated(new Date().toLocaleTimeString());
                    // Logic ngầm kiểm tra hoặc nạp dữ liệu mới từ API/Server nếu có cấu hình nâng cao trong tương lai
                    console.log("Hệ thống đã tự động đồng bộ kết quả mới nhất lúc: " + new Date().toLocaleTimeString());
                }, 300000); 
                return () => clearInterval(interval);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (playerNameInput.trim()) {
                    setCurrentPlayer(playerNameInput.trim());
                    localStorage.setItem('wc_current_player', playerNameInput.trim());
                }
            };

            const handleLogout = () => {
                setCurrentPlayer("");
                localStorage.removeItem('wc_current_player');
                setIsAdmin(false);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === ADMIN_PWD) {
                    setIsAdmin(true);
                    alert("Đăng nhập quản trị thành công!");
                } else {
                    alert("Sai mật khẩu!");
                }
                setAdminPassword("");
            };

            const submitPrediction = (e) => {
                e.preventDefault();
                if (!currentPlayer) {
                    alert("Vui lòng nhập tên người chơi trước khi dự đoán!");
                    return;
                }
                if (predA === "" || predB === "") {
                    alert("Vui lòng nhập đầy đủ tỉ số!");
                    return;
                }

                const matchPreds = predictions[selectedMatch.id] || [];
                // Giới hạn tối đa 4 người cùng 1 tỷ số
                const sameScoreCount = matchPreds.filter(p => p.scoreA === parseInt(predA) && p.scoreB === parseInt(predB)).length;
                if (sameScoreCount >= 4) {
                    alert("Tỉ số này đã có tối đa 4 người đặt. Vui lòng chọn tỉ số khác!");
                    return;
                }

                const newPred = {
                    player: currentPlayer,
                    scoreA: parseInt(predA),
                    scoreB: parseInt(predB)
                };

                const updatedPreds = {
                    ...predictions,
                    [selectedMatch.id]: [...matchPreds.filter(p => p.player !== currentPlayer), newPred]
                };

                setPredictions(updatedPreds);
                setSelectedMatch(null);
                setPredA("");
                setPredB("");
                alert("Đăng ký dự đoán thành công!");
            };

            return (
                <div class="max-w-4xl mx-auto p-4">
                    {/* Header */}
                    <div class="flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-lg shadow mb-6 gap-4">
                        <div>
                            <h1 class="text-3xl font-bold text-blue-900">🏆 WORLD CUP 2026</h1>
                            <p class="text-sm text-gray-500">Tự động cập nhật kết quả mỗi 5 phút | Lần cuối: {lastUpdated}</p>
                        </div>

                        {/* Khu vực đăng nhập bảo đảm không bị giật ô */}
                        <div class="flex items-center gap-2">
                            {currentPlayer ? (
                                <div class="text-right">
                                    <span class="font-bold text-green-700 text-lg">Chào, {currentPlayer}! </span>
                                    <button onClick={handleLogout} class="text-xs text-red-500 underline ml-2">Thoát</button>
                                </div>
                            ) : (
                                <form onSubmit={handleLogin} class="flex gap-2">
                                    <input 
                                        type="text" 
                                        placeholder="Nhập tên người chơi..." 
                                        value={playerNameInput}
                                        onChange={(e) => setPlayerNameInput(e.target.value)}
                                        class="border p-2 rounded text-base w-48"
                                        required
                                    />
                                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">Vào Chơi</button>
                                </form>
                            )}
                        </div>
                    </div>

                    {/* Danh sách trận đấu */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        {matches.map(match => (
                            <div key={match.id} class="bg-white p-4 rounded-lg shadow-md border-t-4 border-blue-500 flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between text-sm text-gray-500 mb-2">
                                        <span class="font-bold uppercase text-blue-700">{match.round}</span>
                                        <span>{match.time}</span>
                                    </div>
                                    <div class="grid grid-cols-3 items-center text-center my-4">
                                        <div class="font-bold text-lg text-gray-800">{match.teamA}</div>
                                        <div class="text-2xl font-black text-red-600">
                                            {match.finished ? `${match.scoreA} - ${match.scoreB}` : "VS"}
                                        </div>
                                        <div class="font-bold text-lg text-gray-800">{match.teamB}</div>
                                    </div>
                                </div>
                                
                                {/* YÊU CẦU 7: Thay cụm từ Nhấn để đặt cược thành Nhấn để dự đoán */}
                                <button 
                                    onClick={() => setSelectedMatch(match)}
                                    class="w-full mt-2 bg-amber-500 text-white py-2 rounded font-bold hover:bg-amber-600 transition"
                                >
                                    🗳️ Nhấn để dự đoán
                                </button>
                            </div>
                        ))}
                    </div>

                    {/* Modal Popup Nhập tỉ số dự đoán */}
                    {selectedMatch && (
                        <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div class="bg-white rounded-lg p-6 max-w-sm w-full shadow-xl">
                                <h3 class="text-xl font-bold mb-4 text-center text-blue-900">Dự Đoán Tỉ Số</h3>
                                <p class="text-center text-gray-600 mb-4">{selectedMatch.teamA} VS {selectedMatch.teamB}</p>
                                <form onSubmit={submitPrediction}>
                                    <div class="flex gap-4 justify-center items-center mb-6">
                                        <div class="text-center">
                                            <span class="block text-sm font-bold text-gray-700 mb-1">{selectedMatch.teamA}</span>
                                            <input type="number" min="0" value={predA} onChange={e => setPredA(e.target.value)} class="border-2 p-2 w-16 text-center text-xl rounded font-bold" required />
                                        </div>
                                        <span class="text-xl font-bold mt-6">-</span>
                                        <div class="text-center">
                                            <span class="block text-sm font-bold text-gray-700 mb-1">{selectedMatch.teamB}</span>
                                            <input type="number" min="0" value={predB} onChange={e => setPredB(e.target.value)} class="border-2 p-2 w-16 text-center text-xl rounded font-bold" required />
                                        </div>
                                    </div>
                                    <div class="flex gap-2">
                                        <button type="button" onClick={() => setSelectedMatch(null)} class="w-1/2 bg-gray-300 text-gray-700 py-2 rounded font-bold">Hủy</button>
                                        <button type="submit" class="w-1/2 bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">Xác Nhận</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* YÊU CẦU 3 & 4 & 5: Danh mục hướng dẫn đã đổi phông chữ Times New Roman, chuyển đổi đơn vị Xu -> CiViet và sửa tỉ lệ quy đổi */}
                    <div class="bg-white p-6 rounded-lg shadow-md mb-6 border-l-4 border-amber-500">
                        <h2 class="text-2xl font-bold text-amber-800 mb-4 flex items-center gap-2">📖 HƯỚNG DẪN THAM GIA</h2>
                        <div class="space-y-4 text-base leading-relaxed text-gray-700">
                            <div>
                                <h3 class="font-bold text-blue-900 mb-1">🎮 Cách tham gia chơi:</h3>
                                <ol class="list-decimal pl-5 space-y-1">
                                    <li>Điền tên định danh của bạn ở góc trên bên phải màn hình để hệ thống nhận diện tài khoản suốt mùa giải.</li>
                                    <li>Lựa chọn các cặp đấu kịch tính muốn tham gia dự đoán bên trên bằng cách bấm vào nút <span class="font-bold text-amber-600">"Nhấn để dự đoán"</span>.</li>
                                    <li>Nhập kết quả tỷ số dự kiến và gửi xác nhận. Kết quả sẽ được ghi lại tự động.</li>
                                </ol>
                            </div>
                            
                            <div>
                                <h3 class="font-bold text-blue-900 mb-1">💰 Quy định Mức Cược (Đơn vị tính: CiViet):</h3>
                                <table class="min-w-full divide-y divide-gray-200 border text-center mt-2">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-4 py-2 text-sm font-bold text-gray-700 border">Vòng đấu</th>
                                            <th class="px-4 py-2 text-sm font-bold text-gray-700 border">Mức cược yêu cầu</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-200 bg-white">
                                        <tr><td class="px-4 py-2 border">Vòng Bảng</td><td class="px-4 py-2 font-bold text-amber-600 border">10 CiViet</td></tr>
                                        <tr><td class="px-4 py-2 border">Vòng 1/16, 1/8, Tứ Kết, Bán Kết</td><td class="px-4 py-2 font-bold text-amber-600 border">20 CiViet</td></tr>
                                        <tr><td class="px-4 py-2 border">Tranh Hạng Ba</td><td class="px-4 py-2 font-bold text-amber-600 border">50 CiViet</td></tr>
                                        <tr><td class="px-4 py-2 border">Trận Chung Kết</td><td class="px-4 py-2 font-bold text-amber-600 border">100 CiViet</td></tr>
                                    </tbody>
                                </table>
                            </div>

                            <div>
                                <h3 class="font-bold text-blue-900 mb-1">📊 Quy tắc tính điểm & Tỷ giá chuyển đổi:</h3>
                                <ul class="list-disc pl-5 space-y-1">
                                    <li>Mỗi tỷ số trận đấu chấp nhận tối đa <span class="font-bold">4 người chơi</span> lựa chọn trùng nhau.</li>
                                    <li><span class="font-bold">85% tổng quỹ (pool)</span> của trận đấu sẽ chia đều cho tất cả những thành viên dự đoán chính xác tuyệt đối tỷ số.</li>
                                    <li><span class="font-bold">15% tổng quỹ (pool)</span> sẽ được trích nộp lại vào quỹ chung của Ban tổ chức giải.</li>
                                    <li class="text-green-700 font-bold bg-green-50 p-2 rounded border border-green-200 mt-2">
                                        💡 Quy định quy đổi giá trị nội bộ: 1 CiViet = 1,000 Đồng.
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    {/* Khu vực Admin quản lý ẩn */}
                    <div class="bg-gray-800 text-white p-4 rounded-lg shadow">
                        <h2 class="text-xl font-bold mb-2">🔐 Khu vực Quản trị viên (Admin)</h2>
                        {!isAdmin ? (
                            <form onSubmit={handleAdminLogin} class="flex gap-2">
                                <input 
                                    type="password" 
                                    placeholder="Nhập mã pin Admin..." 
                                    value={adminPassword} 
                                    onChange={e => setAdminPassword(e.target.value)} 
                                    class="p-2 rounded text-black text-sm"
                                    required
                                />
                                <button type="submit" class="bg-gray-600 px-4 py-2 rounded hover:bg-gray-500 font-bold">Xác thực</button>
                            </form>
                        ) : (
                            <p class="text-green-400 font-bold">⚡ Chế độ Admin đang hoạt động. Bạn có quyền điều hành dữ liệu giải đấu.</p>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
