<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Cup Predictor</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-3xl font-bold text-center mb-6">
⚽ World Cup Prediction
</h1>

<div class="max-w-xl mx-auto mb-6">
  <input id="player" placeholder="Tên của bạn"
    class="w-full p-3 border rounded">
</div>

<div id="matches" class="max-w-3xl mx-auto space-y-4"></div>

<script>
async function loadMatches() {
  const res = await fetch("/matches");
  const matches = await res.json();

  const html = matches.map(m => `
    <div class="bg-white p-4 rounded shadow flex items-center justify-between">

      <div class="w-1/3 font-bold">${m.teamA}</div>

      <div class="flex items-center gap-2">
        <input id="a-${m.id}" class="w-14 border text-center">
        <span>:</span>
        <input id="b-${m.id}" class="w-14 border text-center">
      </div>

      <div class="w-1/3 text-right font-bold">${m.teamB}</div>

      <button onclick="save(${m.id})"
        class="ml-4 bg-blue-500 text-white px-3 py-1 rounded">
        Save
      </button>
    </div>
  `).join("");

  document.getElementById("matches").innerHTML = html;
}

async function save(id) {
  const player = document.getElementById("player").value;

  await fetch("/predict", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      player,
      match_id: id,
      predA: parseInt(document.getElementById(`a-${id}`).value),
      predB: parseInt(document.getElementById(`b-${id}`).value)
    })
  });

  alert("✅ Saved");
}

loadMatches();
</script>

</body>
</html>
