<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ World Cup 2026 – Dự Đoán</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #050c1a; font-family: 'Barlow', sans-serif; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #060e1d; }
    ::-webkit-scrollbar-thumb { background: #1c3455; border-radius: 3px; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    @keyframes sU  { from { transform:translateY(14px);opacity:0 } to { transform:translateY(0);opacity:1 } }
    @keyframes fI  { from { opacity:0 } to { opacity:1 } }
    @keyframes tIn { from { transform:translate(-50%,10px);opacity:0 } to { transform:translate(-50%,0);opacity:1 } }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,202,40,0.5)} 50%{box-shadow:0 0 0 8px rgba(255,202,40,0)} }
    @keyframes glow  { 0%,100%{box-shadow:0 0 0 0 rgba(0,217,126,0.4)} 50%{box-shadow:0 0 16px 4px rgba(0,217,126,0.15)} }
    .mc:hover { border-color:#1e4070 !important; }
    .tab-btn:hover { color:#c8ddff !important; }
    .pill-btn:hover { opacity:0.85; }
    .today-card { animation: glow 2.5s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const PHASES = {
  group: { label:"Vòng Bảng",  bet:10000  },
  r32:   { label:"Vòng 1/16", bet:20000  },
  r16:   { label:"Vòng 1/8",  bet:20000  },
  qf:    { label:"Tứ Kết",    bet:20000  },
  sf:    { label:"Bán Kết",   bet:20000  },
  third: { label:"Tranh HB3", bet:50000  },
  final: { label:"Chung Kết", bet:100000 },
};

const GROUPS = {
  A:["Mỹ","Panama","Uruguay","Bolivia"],
  B:["Mexico","Jamaica","Venezuela","Ecuador"],
  C:["Canada","Honduras","El Salvador","Maroc"],
  D:["Đức","Nhật Bản","Úc","Chile"],
  E:["Tây Ban Nha","Hà Lan","Serbia","Senegal"],
  F:["Pháp","Bỉ","Ukraine","Cameroon"],
  G:["Anh","Croatia","Thổ Nhĩ Kỳ","Saudi Arabia"],
  H:["Brazil","Colombia","Peru","Mali"],
  I:["Argentina","Paraguay","Iran","Nigeria"],
  J:["Hàn Quốc","Qatar","Iraq","Romania"],
  K:["Ý","Thụy Sĩ","Áo","Ai Cập"],
  L:["Bồ Đào Nha","Ba Lan","Đan Mạch","New Zealand"],
};

const MAX_SAME    = 4;
const MAX_CHANGES = 3;       // số lần đổi dự đoán
const SK          = "wc2026_v3";
const SK_ADMIN    = "wc2026_adminpwd";
const SK_PLAYERS  = "wc2026_players";

// ─── MATCH SCHEDULE (UTC+7) ──────────────────────────────────────────────────
// Format: "YYYY-MM-DDTHH:MM" (giờ Việt Nam GMT+7)
// Lịch thi đấu World Cup 2026 thực tế (nhóm A-L, vòng bảng)
// Ngày thi đấu: 11/06/2026 – 02/07/2026
function buildSchedule() {
  // Bảng A (USA, Canada, Mexico - đăng cai; Bolivia, Panama, Uruguay, Jamaica, Venezuela, Ecuador...)
  // Lịch chính thức chưa được công bố đầy đủ; dùng lịch mẫu hợp lý theo múi giờ GMT+7
  const schedule = {
    // Bảng A
    "A_0_1": "2026-06-12T09:00", "A_0_2": "2026-06-12T18:00", "A_0_3": "2026-06-16T09:00",
    "A_1_2": "2026-06-16T18:00", "A_1_3": "2026-06-20T22:00", "A_0_3b": "2026-06-20T22:00",
    // Bảng B
    "B_0_1": "2026-06-13T02:00", "B_0_2": "2026-06-13T05:00", "B_0_3": "2026-06-17T02:00",
    "B_1_2": "2026-06-17T05:00", "B_1_3": "2026-06-21T22:00", "B_2_3": "2026-06-21T22:00",
    // Bảng C
    "C_0_1": "2026-06-13T18:00", "C_0_2": "2026-06-14T02:00", "C_0_3": "2026-06-17T18:00",
    "C_1_2": "2026-06-18T02:00", "C_1_3": "2026-06-22T22:00", "C_2_3": "2026-06-22T22:00",
    // Bảng D
    "D_0_1": "2026-06-14T18:00", "D_0_2": "2026-06-15T02:00", "D_0_3": "2026-06-18T18:00",
    "D_1_2": "2026-06-19T02:00", "D_1_3": "2026-06-23T22:00", "D_2_3": "2026-06-23T22:00",
    // Bảng E
    "E_0_1": "2026-06-15T18:00", "E_0_2": "2026-06-15T21:00", "E_0_3": "2026-06-19T18:00",
    "E_1_2": "2026-06-19T21:00", "E_1_3": "2026-06-24T22:00", "E_2_3": "2026-06-24T22:00",
    // Bảng F
    "F_0_1": "2026-06-14T09:00", "F_0_2": "2026-06-14T22:00", "F_0_3": "2026-06-18T09:00",
    "F_1_2": "2026-06-18T22:00", "F_1_3": "2026-06-24T02:00", "F_2_3": "2026-06-24T05:00",
    // Bảng G
    "G_0_1": "2026-06-15T09:00", "G_0_2": "2026-06-15T22:00", "G_0_3": "2026-06-19T09:00",
    "G_1_2": "2026-06-19T22:00", "G_1_3": "2026-06-25T02:00", "G_2_3": "2026-06-25T05:00",
    // Bảng H
    "H_0_1": "2026-06-16T02:00", "H_0_2": "2026-06-16T05:00", "H_0_3": "2026-06-20T02:00",
    "H_1_2": "2026-06-20T05:00", "H_1_3": "2026-06-25T22:00", "H_2_3": "2026-06-25T22:00",
    // Bảng I
    "I_0_1": "2026-06-16T09:00", "I_0_2": "2026-06-17T09:00", "I_0_3": "2026-06-20T09:00",
    "I_1_2": "2026-06-21T09:00", "I_1_3": "2026-06-26T22:00", "I_2_3": "2026-06-26T22:00",
    // Bảng J
    "J_0_1": "2026-06-17T22:00", "J_0_2": "2026-06-18T05:00", "J_0_3": "2026-06-21T18:00",
    "J_1_2": "2026-06-22T05:00", "J_1_3": "2026-06-27T02:00", "J_2_3": "2026-06-27T05:00",
    // Bảng K
    "K_0_1": "2026-06-13T09:00", "K_0_2": "2026-06-13T22:00", "K_0_3": "2026-06-17T22:00",
    "K_1_2": "2026-06-18T09:00", "K_1_3": "2026-06-27T22:00", "K_2_3": "2026-06-27T22:00",
    // Bảng L
    "L_0_1": "2026-06-12T22:00", "L_0_2": "2026-06-13T02:00", "L_0_3": "2026-06-16T22:00",
    "L_1_2": "2026-06-17T02:00", "L_1_3": "2026-06-28T02:00", "L_2_3": "2026-06-28T05:00",
  };
  return schedule;
}

// Lịch vòng loại trực tiếp (ước tính)
const KO_SCHEDULE = [
  "2026-07-01T02:00","2026-07-01T05:00","2026-07-01T22:00","2026-07-02T02:00",
  "2026-07-02T05:00","2026-07-02T22:00","2026-07-03T02:00","2026-07-03T05:00",
  "2026-07-03T22:00","2026-07-04T02:00","2026-07-04T05:00","2026-07-04T22:00",
  "2026-07-05T02:00","2026-07-05T05:00","2026-07-05T22:00","2026-07-06T02:00",
  // r16
  "2026-07-08T02:00","2026-07-08T22:00","2026-07-09T02:00","2026-07-09T22:00",
  "2026-07-10T02:00","2026-07-10T22:00","2026-07-11T02:00","2026-07-11T22:00",
  // qf
  "2026-07-14T22:00","2026-07-15T22:00","2026-07-16T22:00","2026-07-17T22:00",
  // sf
  "2026-07-21T22:00","2026-07-22T22:00",
  // third
  "2026-07-25T22:00",
  // final
  "2026-07-26T22:00",
];

function genMatches() {
  const ms = [];
  let n = 1;
  const sch = buildSchedule();
  Object.entries(GROUPS).forEach(([grp, teams]) => {
    let pair = 0;
    for (let i = 0; i < 4; i++) {
      for (let j = i + 1; j < 4; j++) {
        const keys = [`${grp}_${i}_${j}`, `${grp}_${i}_${j}b`];
        let dt = null;
        for (const k of keys) if (sch[k]) { dt = sch[k]; break; }
        ms.push({
          id:`M${String(n++).padStart(3,"0")}`,
          phase:"group", group:grp,
          home:teams[i], away:teams[j],
          status:"upcoming", result:null, preds:[],
          kickoff: dt,
        });
        pair++;
      }
    }
  });
  let koIdx = 0;
  [["r32",16],["r16",8],["qf",4],["sf",2],["third",1],["final",1]].forEach(([ph,c]) => {
    for (let i = 0; i < c; i++) {
      ms.push({
        id:`M${String(n++).padStart(3,"0")}`,
        phase:ph, group:null,
        home:"TBD", away:"TBD",
        status:"upcoming", result:null, preds:[],
        kickoff: KO_SCHEDULE[koIdx++] || null,
      });
    }
  });
  return ms;
}

const fmt   = n => Math.round(n).toLocaleString("vi-VN")+"₫";
const fmtDT = iso => {
  if (!iso) return null;
  const d = new Date(iso);
  return d.toLocaleString("vi-VN",{timeZone:"Asia/Ho_Chi_Minh",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
};
const isToday = iso => {
  if (!iso) return false;
  const now  = new Date();
  const d    = new Date(iso);
  const vn   = t => new Date(t.toLocaleString("en-US",{timeZone:"Asia/Ho_Chi_Minh"}));
  const n2   = vn(now), d2 = vn(d);
  return n2.getFullYear()===d2.getFullYear()&&n2.getMonth()===d2.getMonth()&&n2.getDate()===d2.getDate();
};
const isSoon = iso => {
  if (!iso) return false;
  const diff = new Date(iso) - Date.now();
  return diff > 0 && diff < 3*60*60*1000; // trong 3 tiếng tới
};

function calcStats(m) {
  const bet  = PHASES[m.phase].bet;
  const pool = m.preds.length * bet;
  const fund = Math.round(pool * 0.15);
  const prize= Math.round(pool * 0.85);
  const winners = m.result ? m.preds.filter(p=>p.h===m.result.h&&p.a===m.result.a) : [];
  const perW = winners.length>0 ? Math.round(prize/winners.length) : 0;
  return {bet,pool,fund,prize,winners,perW};
}

function loadData() {
  try { const r=localStorage.getItem(SK); if(r) return JSON.parse(r); } catch{}
  return null;
}
function saveData(d) { try{localStorage.setItem(SK,JSON.stringify(d));}catch{} }
function loadAdminPwd() { return localStorage.getItem(SK_ADMIN)||"admin2026"; }
function saveAdminPwd(p){ localStorage.setItem(SK_ADMIN,p); }
function loadPlayers()  { try{const r=localStorage.getItem(SK_PLAYERS);if(r)return JSON.parse(r);}catch{} return {}; }
function savePlayers(p) { try{localStorage.setItem(SK_PLAYERS,JSON.stringify(p));}catch{} }

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [data,    setData   ] = useState(()=>{ const s=loadData(); return s||{matches:genMatches(),fund:0}; });
  const [players, setPlayers] = useState(loadPlayers);   // {name: {pwd?}}
  const [adminPwd,setAdminPwd] = useState(loadAdminPwd);

  // current user
  const [name,    setName   ] = useState(()=>localStorage.getItem("wc2026_myname")||"");
  const [editName,setEditName] = useState(!localStorage.getItem("wc2026_myname"));
  const [authModal,setAuthModal] = useState(null); // {mode:"login"|"register"|"changepwd", name?}

  // tabs
  const [tab,   setTab  ] = useState("matches");
  const [phase, setPhase] = useState("group");
  const [grp,   setGrp  ] = useState("A");

  // prediction modal
  const [selMatch,setSelMatch] = useState(null);
  const [pH, setPH] = useState("");
  const [pA, setPA] = useState("");

  // admin
  const [adminUnlocked,   setAdminUnlocked  ] = useState(false);
  const [adminLoginPwd,   setAdminLoginPwd  ] = useState("");
  const [adminSel,        setAdminSel       ] = useState(null);
  const [rH, setRH] = useState(""); const [rA,setRA] = useState("");
  const [editTeam,        setEditTeam       ] = useState(null);
  const [eH, setEH] = useState(""); const [eA,setEA] = useState("");
  const [detailMatch,     setDetailMatch    ] = useState(null);
  const [changePwdModal,  setChangePwdModal ] = useState(false);
  const [newAdminPwd,     setNewAdminPwd    ] = useState("");
  const [newAdminPwd2,    setNewAdminPwd2   ] = useState("");

  // toast
  const [toast, setToast] = useState(null);

  // tick for "today" check
  const [tick, setTick] = useState(0);
  useEffect(()=>{ const t=setInterval(()=>setTick(x=>x+1),60000); return()=>clearInterval(t); },[]);

  const persist = useCallback(d=>{ setData(d); saveData(d); },[]);
  const persistPlayers = useCallback(p=>{ setPlayers(p); savePlayers(p); },[]);
  const showT = useCallback((msg,t="ok")=>{ setToast({msg,t}); setTimeout(()=>setToast(null),3200); },[]);

  const saveName = n => { setName(n); if(n.trim()) localStorage.setItem("wc2026_myname",n.trim()); };

  // ── AUTH helpers ──────────────────────────────────────────────────────────
  function isPlayerRegistered(nm) { return !!players[nm.toLowerCase()]; }
  function playerHasPwd(nm)        { return !!players[nm.toLowerCase()]?.pwd; }
  function checkPlayerPwd(nm,pwd)  { const p=players[nm.toLowerCase()]; return p?.pwd===pwd; }

  function openMatchForPred(m) {
    const nm = name.trim();
    if (!nm) { showT("Nhập tên của bạn trước!","err"); return; }
    // Nếu người này chưa được đăng ký trong hệ thống → tự đăng ký
    if (!isPlayerRegistered(nm)) {
      // hiển thị modal đặt mật khẩu (tùy chọn)
      setSelMatch(m); setPH(""); setPA("");
      return;
    }
    // Nếu có mật khẩu → yêu cầu xác thực trước
    if (playerHasPwd(nm)) {
      setAuthModal({mode:"login", name:nm, next:()=>{ setSelMatch(m); setPH(""); setPA(""); }});
      return;
    }
    setSelMatch(m); setPH(""); setPA("");
  }

  // ── PREDICTION ────────────────────────────────────────────────────────────
  function doPred() {
    const nm = name.trim();
    if (!nm) { showT("Nhập tên của bạn trước!","err"); return; }
    const h=parseInt(pH), a=parseInt(pA);
    if (pH===""||pA===""||isNaN(h)||isNaN(a)||h<0||a<0||h>20||a>20) { showT("Tỷ số không hợp lệ!","err"); return; }
    const m = data.matches.find(x=>x.id===selMatch.id);
    if (m.status==="finished") { showT("Trận đã kết thúc!","err"); return; }

    const existing = m.preds.find(p=>p.name.toLowerCase()===nm.toLowerCase());
    if (existing) {
      // Đổi dự đoán
      if ((existing.changes||0) >= MAX_CHANGES) { showT(`Bạn đã dùng hết ${MAX_CHANGES} lần đổi dự đoán!`,"err"); return; }
      // Kiểm tra slot của tỷ số mới
      const sameNew = m.preds.filter(p=>p.name.toLowerCase()!==nm.toLowerCase()&&p.h===h&&p.a===a);
      if (sameNew.length >= MAX_SAME) { showT(`Tỷ số ${h}-${a} đã đủ ${MAX_SAME} người!`,"err"); return; }
      const changes = (existing.changes||0)+1;
      const newMs = data.matches.map(x=>
        x.id===m.id ? {...x, preds:x.preds.map(p=>p.name.toLowerCase()===nm.toLowerCase()?{...p,h,a,changes,ts:Date.now()}:p)} : x
      );
      persist({...data,matches:newMs});
      setSelMatch(null); setPH(""); setPA("");
      showT(`✅ Đổi dự đoán → ${h}–${a} (lần ${changes}/${MAX_CHANGES})`);
    } else {
      // Đặt lần đầu
      const same = m.preds.filter(p=>p.h===h&&p.a===a);
      if (same.length>=MAX_SAME) { showT(`Tỷ số ${h}-${a} đã đủ ${MAX_SAME} người!`,"err"); return; }
      // Tự đăng ký người chơi nếu chưa có
      if (!isPlayerRegistered(nm)) {
        const np = {...players, [nm.toLowerCase()]:{name:nm, joinedAt:Date.now()}};
        persistPlayers(np);
      }
      const newMs = data.matches.map(x=>
        x.id===m.id ? {...x, preds:[...x.preds,{name:nm,h,a,changes:0,ts:Date.now()}]} : x
      );
      persist({...data,matches:newMs});
      setSelMatch(null); setPH(""); setPA("");
      showT(`✅ Đặt cược ${h}–${a} thành công!`);
    }
  }

  // ── ADMIN ACTIONS ─────────────────────────────────────────────────────────
  function doResult() {
    const h=parseInt(rH), a=parseInt(rA);
    if (isNaN(h)||isNaN(a)||h<0||a<0) { showT("Kết quả không hợp lệ!","err"); return; }
    const m = data.matches.find(x=>x.id===adminSel.id);
    const {fund} = calcStats({...m,result:{h,a}});
    const newMs = data.matches.map(x=>x.id===m.id?{...x,status:"finished",result:{h,a}}:x);
    persist({...data,matches:newMs,fund:(data.fund||0)+fund});
    setAdminSel(null); setRH(""); setRA("");
    showT(`✅ Kết quả ${h}–${a} đã lưu!`);
  }
  function doSetKickoff(matchId, iso) {
    const newMs = data.matches.map(x=>x.id===matchId?{...x,kickoff:iso}:x);
    persist({...data,matches:newMs});
  }
  function doTeam() {
    if (!eH.trim()||!eA.trim()) { showT("Nhập tên đội!","err"); return; }
    const newMs = data.matches.map(x=>x.id===editTeam.id?{...x,home:eH.trim(),away:eA.trim()}:x);
    persist({...data,matches:newMs});
    setEditTeam(null);
    showT("✅ Đã cập nhật tên đội!");
  }
  function doReset(m) {
    const {fund:f}=calcStats(m);
    const newMs = data.matches.map(x=>x.id===m.id?{...x,status:"upcoming",result:null}:x);
    persist({...data,matches:newMs,fund:Math.max(0,(data.fund||0)-f)});
    showT("Đã reset kết quả");
  }
  function doDeletePred(matchId,playerName) {
    const newMs = data.matches.map(x=>x.id===matchId?{...x,preds:x.preds.filter(p=>p.name!==playerName)}:x);
    persist({...data,matches:newMs});
    showT("Đã xóa dự đoán");
  }
  function doChangeAdminPwd() {
    if (!newAdminPwd.trim()||newAdminPwd.length<4) { showT("Mật khẩu phải ≥ 4 ký tự!","err"); return; }
    if (newAdminPwd!==newAdminPwd2) { showT("Mật khẩu xác nhận không khớp!","err"); return; }
    saveAdminPwd(newAdminPwd);
    setAdminPwd(newAdminPwd);
    setChangePwdModal(false); setNewAdminPwd(""); setNewAdminPwd2("");
    showT("✅ Đã đổi mật khẩu quản trị!");
  }
  function doSetPlayerPwd(nm, pwd) {
    const np = {...players, [nm.toLowerCase()]:{...(players[nm.toLowerCase()]||{name:nm}), pwd}};
    persistPlayers(np);
    showT("✅ Mật khẩu đã được lưu!");
  }

  // ── MEMOS ─────────────────────────────────────────────────────────────────
  const board = useMemo(()=>{
    const s={};
    data.matches.forEach(m=>{
      if(m.status!=="finished"||!m.result) return;
      const {bet,perW}=calcStats(m);
      m.preds.forEach(p=>{
        if(!s[p.name]) s[p.name]={name:p.name,bet:0,won:0,correct:0,n:0};
        s[p.name].bet+=bet; s[p.name].n++;
        if(p.h===m.result.h&&p.a===m.result.a){s[p.name].won+=perW;s[p.name].correct++;}
      });
    });
    return Object.values(s).map(x=>({...x,profit:x.won-x.bet})).sort((a,b)=>b.profit-a.profit);
  },[data]);

  const myPreds = useMemo(()=>{
    if(!name.trim()) return [];
    const nm=name.toLowerCase().trim();
    return data.matches
      .filter(m=>m.preds.some(p=>p.name.toLowerCase()===nm))
      .map(m=>({m,p:m.preds.find(p=>p.name.toLowerCase()===nm),st:m.status==="finished"?calcStats(m):null}));
  },[data,name]);

  const filtered = useMemo(()=>{
    let ms=data.matches.filter(m=>m.phase===phase);
    if(phase==="group") ms=ms.filter(m=>m.group===grp);
    return ms;
  },[data,phase,grp,tick]);

  const totals = useMemo(()=>({
    pool:  data.matches.reduce((s,m)=>s+m.preds.length*PHASES[m.phase].bet,0),
    players: new Set(data.matches.flatMap(m=>m.preds.map(p=>p.name))).size,
    finished:data.matches.filter(m=>m.status==="finished").length,
    preds: data.matches.reduce((s,m)=>s+m.preds.length,0),
    total: data.matches.length,
  }),[data]);

  const todayMatches = useMemo(()=>data.matches.filter(m=>m.kickoff&&isToday(m.kickoff)&&m.status!=="finished"),[data,tick]);

  // ── STYLES ────────────────────────────────────────────────────────────────
  const C={
    bg:"#050c1a",sur:"#091525",card:"#0c1c32",border:"#163050",
    green:"#00d97e",gold:"#ffca28",red:"#ff5252",blue:"#4fc3f7",
    orange:"#ff9800",text:"#ddeeff",muted:"#52708f",dim:"#1e3454",
    today:"#ff9800",soon:"#ff5252",
  };
  const inp=(extra={})=>({background:"#060f20",border:`1px solid ${C.border}`,borderRadius:"8px",color:C.text,padding:"10px 14px",fontFamily:"Barlow,sans-serif",fontSize:"14px",width:"100%",outline:"none",...extra});
  const btn=(c="green",extra={})=>({background:c==="green"?C.green:c==="gold"?C.gold:c==="red"?C.red:c==="blue"?C.blue:c==="orange"?C.orange:C.dim,color:c==="dim"?C.muted:"#000",border:"none",borderRadius:"8px",padding:"9px 18px",cursor:"pointer",fontWeight:700,fontFamily:"Barlow,sans-serif",fontSize:"13px",...extra});
  const cardS=(extra={})=>({background:C.card,border:`1px solid ${C.border}`,borderRadius:"12px",padding:"16px",...extra});
  const overlay={position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:"16px"};
  const modal=(extra={})=>({...cardS(),maxWidth:"420px",width:"100%",animation:"sU 0.2s ease",...extra});

  // ── MATCH CARD ────────────────────────────────────────────────────────────
  function MatchCard({m,adminMode=false}) {
    const ms=calcStats(m);
    const nm=name.trim().toLowerCase();
    const myP=nm?m.preds.find(p=>p.name.toLowerCase()===nm):null;
    const isW=myP&&m.result&&myP.h===m.result.h&&myP.a===m.result.a;
    const done=m.status==="finished";
    const today=!done&&m.kickoff&&isToday(m.kickoff);
    const soon=!done&&m.kickoff&&isSoon(m.kickoff);
    const remainChanges=myP?MAX_CHANGES-(myP.changes||0):MAX_CHANGES;

    let borderCol = C.border;
    if (isW) borderCol=C.gold;
    else if (today) borderCol=C.orange;
    else if (myP) borderCol=`${C.green}66`;

    return (
      <div className={"mc"+(today?" today-card":"")}
        style={{...cardS({marginBottom:"10px",borderColor:borderCol,cursor:!done&&!adminMode?"pointer":"default",animation:"fI 0.25s ease"}),transition:"border-color 0.15s"}}
        onClick={()=>{ if(!done&&!adminMode) openMatchForPred(m); }}>

        {/* Top row */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px",flexWrap:"wrap",gap:"4px"}}>
          <div style={{display:"flex",gap:"5px",alignItems:"center",flexWrap:"wrap"}}>
            <span style={{background:C.dim,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",color:C.muted,fontWeight:600}}>
              {PHASES[m.phase].label}{m.group?` • Bảng ${m.group}`:`• ${m.id}`}
            </span>
            {done&&<span style={{background:`${C.green}20`,color:C.green,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",fontWeight:700}}>✅ KẾT THÚC</span>}
            {!done&&today&&!soon&&<span style={{background:`${C.orange}25`,color:C.orange,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",fontWeight:700,border:`1px solid ${C.orange}50`}}>🔥 HÔM NAY</span>}
            {!done&&soon&&<span style={{background:`${C.red}25`,color:C.red,padding:"2px 8px",borderRadius:"5px",fontSize:"11px",fontWeight:700,border:`1px solid ${C.red}60`,animation:"pulse 1.5s infinite"}}>⚡ SẮP ĐÁ</span>}
          </div>
          <span style={{color:C.gold,fontSize:"13px",fontWeight:700}}>{fmt(PHASES[m.phase].bet)}</span>
        </div>

        {/* Kickoff time */}
        {m.kickoff&&(
          <div style={{fontSize:"11px",color:today?C.orange:C.muted,marginBottom:"8px",display:"flex",alignItems:"center",gap:"4px",fontWeight:today?700:400}}>
            🕐 {fmtDT(m.kickoff)} (GMT+7)
          </div>
        )}

        {/* Teams */}
        <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
          <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"clamp(15px,3vw,21px)",lineHeight:1.1,fontWeight:done||today?"bold":"normal"}}>{m.home}</span>
          <span style={{textAlign:"center",fontFamily:"Bebas Neue,sans-serif",fontSize:done?"clamp(24px,4vw,32px)":"clamp(18px,3vw,24px)",color:done?C.gold:C.dim,padding:"0 6px",minWidth:"70px"}}>
            {done?`${m.result.h} – ${m.result.a}`:"VS"}
          </span>
          <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"clamp(15px,3vw,21px)",lineHeight:1.1,textAlign:"right",fontWeight:done||today?"bold":"normal"}}>{m.away}</span>
        </div>

        {/* Stats row */}
        <div style={{display:"flex",gap:"12px",fontSize:"12px",color:C.muted,flexWrap:"wrap"}}>
          <span>👥 {m.preds.length} dự đoán</span>
          <span>💰 {fmt(ms.pool)}</span>
          {done&&ms.winners.length>0&&<span style={{color:C.green}}>🏆 {ms.winners.length} đúng · {fmt(ms.perW)}/người</span>}
          {done&&ms.winners.length===0&&<span style={{color:C.muted}}>Không ai đúng</span>}
        </div>

        {/* My prediction */}
        {myP&&(
          <div style={{marginTop:"10px",background:isW?`${C.gold}12`:today?`${C.orange}10`:`${C.green}10`,border:`1px solid ${isW?C.gold:today?C.orange:C.green}30`,borderRadius:"8px",padding:"8px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:C.muted,fontSize:"12px"}}>Dự đoán của bạn</span>
              <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"20px",color:isW?C.gold:today?C.orange:C.green}}>{myP.h} – {myP.a}</span>
                {isW&&<span style={{color:C.gold,fontWeight:700,fontSize:"13px"}}>+{fmt(ms.perW)} 🥇</span>}
                {done&&!isW&&<span style={{color:C.red,fontSize:"12px"}}>❌ Sai</span>}
              </div>
            </div>
            {!done&&(
              <div style={{marginTop:"4px",fontSize:"11px",color:C.muted}}>
                Còn <b style={{color:remainChanges>0?C.blue:C.red}}>{remainChanges}</b>/{MAX_CHANGES} lần đổi
                {myP.changes>0&&<span style={{marginLeft:"8px",color:C.orange}}>Đã đổi {myP.changes} lần</span>}
              </div>
            )}
          </div>
        )}

        {/* Admin buttons */}
        {adminMode&&(
          <div style={{marginTop:"12px",display:"flex",gap:"8px",flexWrap:"wrap"}}>
            {!done&&<button style={btn("gold")} onClick={e=>{e.stopPropagation();setAdminSel(m);setRH("");setRA("");}}>📝 Nhập KQ</button>}
            <button style={btn("blue")} onClick={e=>{e.stopPropagation();setEditTeam(m);setEH(m.home);setEA(m.away);}}>✏️ Sửa đội</button>
            <button style={btn("orange")} onClick={e=>{e.stopPropagation();
              const iso=prompt("Nhập giờ đấu (VD: 2026-06-15T21:00)\nGMT+7, định dạng YYYY-MM-DDTHH:MM",m.kickoff||"");
              if(iso!==null) doSetKickoff(m.id,iso.trim()||null);
            }}>🕐 Giờ</button>
            {done&&<button style={{...btn("dim"),color:C.red}} onClick={e=>{e.stopPropagation();doReset(m);}}>🔄 Reset</button>}
            <button style={{...btn("dim"),color:C.blue}} onClick={e=>{e.stopPropagation();setDetailMatch(m);}}>📊 Chi tiết</button>
          </div>
        )}

        {!done&&!myP&&!adminMode&&(
          <div style={{marginTop:"8px",color:today?C.orange:C.green,fontSize:"12px",opacity:0.8,fontWeight:today?700:400}}>
            {today?"🔥 Nhấn để đặt cược ngay!":"Nhấn để đặt cược →"}
          </div>
        )}
      </div>
    );
  }

  // ── PHASE/GROUP FILTERS ───────────────────────────────────────────────────
  function PhaseFilter({highlight}) {
    return (
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"14px"}}>
        {Object.entries(PHASES).map(([ph,{label}])=>(
          <button key={ph} className="pill-btn"
            style={{...btn(ph===phase?highlight:"dim"),padding:"6px 12px",fontSize:"12px",color:ph===phase?"#000":C.muted}}
            onClick={()=>setPhase(ph)}>{label}</button>
        ))}
      </div>
    );
  }
  function GroupFilter() {
    return phase==="group"?(
      <div style={{display:"flex",gap:"6px",marginBottom:"14px",flexWrap:"wrap"}}>
        {Object.keys(GROUPS).map(g=>(
          <button key={g} className="pill-btn"
            style={{...btn(g===grp?"green":"dim"),padding:"5px 11px",fontSize:"13px",color:g===grp?"#000":C.muted,minWidth:"38px"}}
            onClick={()=>setGrp(g)}>Bảng {g}</button>
        ))}
      </div>
    ):null;
  }

  // ── TABS ──────────────────────────────────────────────────────────────────
  function TabMatches() {
    return (
      <div>
        {todayMatches.length>0&&(
          <div style={{...cardS({marginBottom:"16px",borderColor:`${C.orange}60`,background:`${C.orange}08`})}}>
            <div style={{color:C.orange,fontWeight:700,fontSize:"13px",marginBottom:"10px",display:"flex",alignItems:"center",gap:"6px"}}>
              🔥 TRẬN HÔM NAY ({todayMatches.length} trận)
            </div>
            {todayMatches.map(m=>(
              <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}
                onClick={()=>openMatchForPred(m)}>
                <div style={{flex:1}}>
                  <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"16px"}}>{m.home}</span>
                  <span style={{color:C.dim,margin:"0 8px",fontFamily:"Bebas Neue,sans-serif"}}>VS</span>
                  <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"16px"}}>{m.away}</span>
                </div>
                <div style={{textAlign:"right"}}>
                  {m.kickoff&&<div style={{color:isSoon(m.kickoff)?C.red:C.orange,fontSize:"12px",fontWeight:700}}>{fmtDT(m.kickoff)}</div>}
                  <div style={{color:C.muted,fontSize:"11px"}}>{PHASES[m.phase].label} · {fmt(PHASES[m.phase].bet)}</div>
                </div>
              </div>
            ))}
          </div>
        )}
        <PhaseFilter highlight="green"/>
        <GroupFilter/>
        {filtered.length===0
          ?<div style={{color:C.muted,textAlign:"center",padding:"50px 20px"}}>Không có trận nào</div>
          :filtered.map(m=><MatchCard key={m.id} m={m}/>)
        }
      </div>
    );
  }

  function TabMine() {
    if (!name.trim()) return (
      <div style={{color:C.muted,textAlign:"center",padding:"60px 20px"}}>
        <div style={{fontSize:"40px",marginBottom:"12px"}}>👤</div>
        <div>Nhập tên của bạn ở trên để xem dự đoán</div>
      </div>
    );
    if (myPreds.length===0) return (
      <div style={{color:C.muted,textAlign:"center",padding:"60px 20px"}}>
        <div style={{fontSize:"40px",marginBottom:"12px"}}>📋</div>
        <div>Bạn chưa có dự đoán nào</div>
        <div style={{marginTop:"8px",fontSize:"12px"}}>Đến tab Trận Đấu để đặt cược!</div>
      </div>
    );
    const totalBet=myPreds.reduce((s,x)=>s+PHASES[x.m.phase].bet,0);
    const finishedPreds=myPreds.filter(x=>x.m.status==="finished");
    const correct=finishedPreds.filter(x=>x.p.h===x.m.result?.h&&x.p.a===x.m.result?.a);
    const totalWon=correct.reduce((s,x)=>s+x.st.perW,0);
    const nm=name.trim().toLowerCase();
    const hasPwd=playerHasPwd(name.trim());
    return (
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:"10px",marginBottom:"16px"}}>
          {[
            {label:"Tổng đặt",value:fmt(totalBet),color:C.muted},
            {label:"Tổng thắng",value:fmt(totalWon),color:C.green},
            {label:"Lãi / lỗ",value:(totalWon-totalBet>=0?"+":"")+fmt(totalWon-totalBet),color:totalWon>=totalBet?C.green:C.red},
            {label:"Đúng / Xong",value:`${correct.length}/${finishedPreds.length}`,color:C.gold},
          ].map(({label,value,color})=>(
            <div key={label} style={{...cardS({textAlign:"center"})}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.8px"}}>{label}</div>
              <div style={{color,fontSize:"15px",fontWeight:700}}>{value}</div>
            </div>
          ))}
        </div>

        {/* Password management */}
        <div style={{...cardS({marginBottom:"16px",borderColor:`${C.blue}40`})}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:600,fontSize:"13px",color:C.blue}}>🔐 Bảo mật tài khoản</div>
              <div style={{color:C.muted,fontSize:"11px",marginTop:"2px"}}>{hasPwd?"Tài khoản đã có mật khẩu bảo vệ":"Chưa đặt mật khẩu – ai cũng có thể đặt cược thay bạn"}</div>
            </div>
            <button style={btn("blue")} onClick={()=>setAuthModal({mode:"changepwd",name:name.trim()})}>
              {hasPwd?"Đổi MK":"Đặt MK"}
            </button>
          </div>
        </div>

        {myPreds.map(({m,p,st})=>{
          const isW=st&&p.h===m.result?.h&&p.a===m.result?.a;
          const today2=!m.result&&m.kickoff&&isToday(m.kickoff);
          const remainC=MAX_CHANGES-(p.changes||0);
          return (
            <div key={m.id} style={{...cardS({marginBottom:"10px",borderColor:isW?C.gold:today2?`${C.orange}60`:C.border})}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px",flexWrap:"wrap",gap:"4px"}}>
                <span style={{color:C.muted,fontSize:"11px"}}>{PHASES[m.phase].label}{m.group?` · Bảng ${m.group}`:""}</span>
                <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                  {m.kickoff&&<span style={{color:today2?C.orange:C.muted,fontSize:"11px"}}>🕐 {fmtDT(m.kickoff)}</span>}
                  {isW&&<span style={{color:C.gold,fontWeight:700}}>🥇 +{fmt(st.perW)}</span>}
                  {st&&!isW&&<span style={{color:C.red,fontSize:"12px"}}>❌ Sai</span>}
                  {!st&&<span style={{color:C.blue,fontSize:"11px"}}>Đang chờ</span>}
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",marginBottom:"8px"}}>
                <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"18px"}}>{m.home}</span>
                <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"22px",color:m.result?C.gold:C.dim,padding:"0 10px",textAlign:"center"}}>{m.result?`${m.result.h}–${m.result.a}`:"?–?"}</span>
                <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"18px",textAlign:"right"}}>{m.away}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"12px",color:C.muted,flexWrap:"wrap",gap:"6px"}}>
                <span>Dự đoán: <span style={{color:isW?C.gold:C.green,fontWeight:700,fontFamily:"Bebas Neue,sans-serif",fontSize:"15px"}}>{p.h}–{p.a}</span>
                  {p.changes>0&&<span style={{color:C.orange,marginLeft:"6px"}}>↺{p.changes}</span>}
                </span>
                <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
                  <span>Đặt: <span style={{color:C.text}}>{fmt(PHASES[m.phase].bet)}</span></span>
                  {!st&&remainC>0&&(
                    <button style={{...btn("dim"),padding:"3px 10px",fontSize:"11px",color:C.blue}} onClick={()=>openMatchForPred(m)}>
                      ✏️ Đổi ({remainC})
                    </button>
                  )}
                  {!st&&remainC===0&&<span style={{color:C.red,fontSize:"11px"}}>Hết lượt đổi</span>}
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  function TabBoard() {
    if (board.length===0) return (
      <div style={{color:C.muted,textAlign:"center",padding:"60px 20px"}}>
        <div style={{fontSize:"40px",marginBottom:"12px"}}>🏆</div>
        <div>Chưa có kết quả nào</div>
      </div>
    );
    return (
      <div style={cardS()}>
        <div style={{color:C.muted,fontSize:"11px",marginBottom:"14px",textTransform:"uppercase",letterSpacing:"1px"}}>Bảng Xếp Hạng</div>
        {board.map((p,i)=>{
          const isMe=name.trim()&&p.name.toLowerCase()===name.toLowerCase().trim();
          return (
            <div key={p.name} style={{display:"flex",alignItems:"center",padding:"11px 0",borderBottom:i<board.length-1?`1px solid ${C.border}`:undefined,background:isMe?`${C.green}08`:undefined,borderRadius:isMe?"6px":undefined,paddingLeft:isMe?"8px":undefined,paddingRight:isMe?"8px":undefined}}>
              <div style={{width:"36px",fontFamily:"Bebas Neue,sans-serif",fontSize:"22px",color:i===0?C.gold:i===1?"#aaa":i===2?"#cd7f32":C.dim}}>{i+1}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:"14px"}}>
                  {i===0?"🥇 ":i===1?"🥈 ":i===2?"🥉 ":""}
                  {p.name}
                  {isMe&&<span style={{color:C.green,fontSize:"10px",border:`1px solid ${C.green}`,borderRadius:"4px",padding:"0 5px",marginLeft:"6px"}}>bạn</span>}
                </div>
                <div style={{color:C.muted,fontSize:"11px",marginTop:"2px"}}>{p.n} trận · {p.correct} đúng ({p.n>0?Math.round((p.correct/p.n)*100):0}%)</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:p.profit>=0?C.green:C.red,fontWeight:700,fontSize:"15px"}}>{p.profit>=0?"+":""}{fmt(p.profit)}</div>
                <div style={{color:C.muted,fontSize:"11px"}}>{fmt(p.won)} thắng</div>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  function TabStats() {
    const byPhase=Object.entries(PHASES).map(([ph,{label,bet}])=>{
      const ms=data.matches.filter(m=>m.phase===ph);
      const done=ms.filter(m=>m.status==="finished");
      const pool=ms.reduce((s,m)=>s+m.preds.length*bet,0);
      return{ph,label,bet,total:ms.length,done:done.length,pool,preds:ms.reduce((s,m)=>s+m.preds.length,0)};
    }).filter(x=>x.preds>0||x.done>0);
    return (
      <div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"10px",marginBottom:"16px"}}>
          {[
            {label:"Người chơi",value:totals.players,color:C.blue},
            {label:"Tổng dự đoán",value:totals.preds,color:C.green},
            {label:"Trận xong",value:`${totals.finished}/${totals.total}`,color:C.gold},
            {label:"Tổng pool",value:fmt(totals.pool),color:C.orange},
            {label:"Quỹ chung (15%)",value:fmt(data.fund||0),color:C.red},
          ].map(({label,value,color})=>(
            <div key={label} style={{...cardS({textAlign:"center"})}}>
              <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.7px"}}>{label}</div>
              <div style={{color,fontSize:"clamp(13px,2vw,15px)",fontWeight:700}}>{value}</div>
            </div>
          ))}
        </div>
        {byPhase.length>0&&(
          <div style={{...cardS({marginBottom:"16px"})}}>
            <div style={{color:C.muted,fontSize:"11px",marginBottom:"14px",textTransform:"uppercase",letterSpacing:"1px"}}>Theo Vòng Đấu</div>
            {byPhase.map((x,i)=>(
              <div key={x.ph} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<byPhase.length-1?`1px solid ${C.border}`:undefined}}>
                <div>
                  <div style={{fontWeight:600,fontSize:"14px"}}>{x.label}</div>
                  <div style={{color:C.muted,fontSize:"11px",marginTop:"2px"}}>{x.done}/{x.total} trận · {x.preds} dự đoán</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:C.gold,fontWeight:700}}>{fmt(x.pool)}</div>

  // ── MODALS ────────────────────────────────────────────────────────────────
  const liveMatch  = selMatch    ? data.matches.find(x=>x.id===selMatch.id)    : null;
  const liveDetail = detailMatch ? data.matches.find(x=>x.id===detailMatch.id) : null;
  const scoreCounts= liveMatch   ? liveMatch.preds.reduce((acc,p)=>{const k=`${p.h}-${p.a}`;acc[k]=(acc[k]||0)+1;return acc;},{}) : {};
  const myExisting = liveMatch&&name.trim() ? liveMatch.preds.find(p=>p.name.toLowerCase()===name.trim().toLowerCase()) : null;

  // Auth modal state

  const [authInputPwd2, setAuthInputPwd2] = useState("");
  const [authError,     setAuthError    ] = useState("");

  function handleAuthSubmit() {
    const nm=authModal.name||name.trim();
    if (authModal.mode==="login") {
      if (checkPlayerPwd(nm,authInputPwd)) {

      } else { setAuthError("Sai mật khẩu!"); }

      doSetPlayerPwd(nm,authInputPwd);
      setAuthModal(null); setAuthInputPwd(""); setAuthInputPwd2(""); setAuthError("");
    }

    {id:"board",  label:"🏆 Xếp Hạng"},
    {id:"stats",  label:"📊 Thống Kê"},
    {id:"admin",  label:"🔑 Quản Trị"},
  ];

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"Barlow,sans-serif",fontSize:"14px"}}>

            {!name.trim()&&<div style={{color:C.red,fontSize:"12px",marginBottom:"12px"}}>⚠️ Nhập tên ở đầu trang trước khi đặt cược!</div>}

              <button style={btn("blue")} onClick={handleAuthSubmit}>{authModal.mode==="login"?"Xác nhận":"Lưu mật khẩu"}</button>

              <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={()=>{setAdminSel(null);setRH("");setRA("");}}>×</button>

              <button style={{background:"transparent",border:"none",color:C.muted,fontSize:"22px",cursor:"pointer"}} onClick={()=>setDetailMatch(null)}>×</button>
            </div>
            {(()=>{
              const ms=calcStats(liveDetail);
              return (
                <>
                  <div style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"24px",textAlign:"center",marginBottom:"6px"}}>
                    {liveDetail.home} {liveDetail.result?`${liveDetail.result.h} – ${liveDetail.result.a}`:"vs"} {liveDetail.away}
                  </div>
                  {liveDetail.kickoff&&<div style={{color:C.muted,fontSize:"12px",textAlign:"center",marginBottom:"14px"}}>🕐 {fmtDT(liveDetail.kickoff)} (GMT+7)</div>}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"16px"}}>
                    {[
                      {l:"Tổng pool",v:fmt(ms.pool),c:C.gold},
                      {l:"Quỹ thưởng (85%)",v:fmt(ms.prize),c:C.green},
                      {l:"Quỹ chung (15%)",v:fmt(ms.fund),c:C.red},
                      {l:"Người đúng",v:ms.winners.length,c:C.blue},
                    ].map(({l,v,c})=>(
                      <div key={l} style={{background:C.sur,borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                        <div style={{color:C.muted,fontSize:"11px",marginBottom:"4px"}}>{l}</div>
                        <div style={{color:c,fontWeight:700,fontSize:"14px"}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {ms.perW>0&&(
                    <div style={{background:`${C.gold}12`,border:`1px solid ${C.gold}30`,borderRadius:"8px",padding:"10px",textAlign:"center",marginBottom:"16px",color:C.gold,fontWeight:700,fontSize:"15px"}}>
                      +{fmt(ms.perW)} cho mỗi người dự đoán đúng
                    </div>
                  )}
                  <div style={{color:C.muted,fontSize:"11px",marginBottom:"10px",textTransform:"uppercase",letterSpacing:"1px"}}>
                    Tất cả dự đoán ({liveDetail.preds.length})
                  </div>
                  {liveDetail.preds.length===0&&<div style={{color:C.dim,textAlign:"center",padding:"20px"}}>Chưa có dự đoán</div>}
                  {liveDetail.preds.map((p,i)=>{
                    const isW=liveDetail.result&&p.h===liveDetail.result.h&&p.a===liveDetail.result.a;
                    return (
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<liveDetail.preds.length-1?`1px solid ${C.border}`:undefined}}>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          {isW&&<span>🥇</span>}
                          <div>
                            <span style={{fontWeight:600}}>{p.name}</span>
                            {p.changes>0&&<span style={{color:C.orange,fontSize:"11px",marginLeft:"6px"}}>↺{p.changes}x đổi</span>}
                          </div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                          <span style={{fontFamily:"Bebas Neue,sans-serif",fontSize:"18px",color:isW?C.gold:C.text}}>{p.h}–{p.a}</span>
                          {isW&&<span style={{color:C.gold,fontWeight:700,fontSize:"12px"}}>+{fmt(ms.perW)}</span>}
                          {adminUnlocked&&(
                            <button style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:"5px",color:C.red,fontSize:"11px",cursor:"pointer",padding:"2px 7px"}}
                              onClick={()=>{doDeletePred(liveDetail.id,p.name);setDetailMatch({...liveDetail,preds:liveDetail.preds.filter(x=>x.name!==p.name)});}}>
                              xóa
                            </button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </>
              );
            })()}
          </div>
        </div>
      )}

      {/* ── TOAST ── */}
      {toast&&(
        <div style={{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:toast.t==="err"?C.red:C.green,color:"#000",padding:"10px 22px",borderRadius:"30px",fontWeight:700,fontSize:"13px",zIndex:2000,animation:"tIn 0.2s ease",whiteSpace:"nowrap",boxShadow:"0 6px 24px rgba(0,0,0,0.5)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
